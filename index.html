<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BCC Fleet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<style>
  :root {
    --red:    #C41230;
    --dark:   #0d0d0d;
    --panel:  #141414;
    --panel2: #1a1a1a;
    --border: #242424;
    --muted:  #555;
    --dim:    #888;
    --white:  #f0f0f0;
    --green:  #2ecc71;
    --yellow: #f39c12;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { background: var(--dark); }
  body { font-family: 'Barlow', sans-serif; color: var(--white); background: var(--dark); }

  /* ── Header ── */
  #hdr {
    position: sticky; top: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; background: var(--panel);
    border-bottom: 2px solid var(--red);
  }
  #hdr h1 {
    font-family: 'Barlow Condensed', sans-serif; font-size: 20px;
    font-weight: 900; letter-spacing: .08em; text-transform: uppercase;
  }
  #hdr h1 span { color: var(--red); }
  #hdr-right { display: flex; align-items: center; gap: 8px; }
  #hdr-meta { font-size: 10px; color: var(--dim); font-family: 'Barlow Condensed', sans-serif; letter-spacing: .04em; }
  #refresh-btn {
    background: none; border: 1px solid var(--border); color: var(--dim);
    border-radius: 4px; padding: 5px 10px; font-size: 11px; cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif; letter-spacing: .06em; text-transform: uppercase;
    transition: all .2s;
  }
  #refresh-btn:hover { border-color: var(--red); color: var(--white); }

  /* ── Date bar ── */
  #datebar {
    position: sticky; top: 44px; z-index: 99;
    display: flex; align-items: center; gap: 8px; padding: 7px 14px;
    background: var(--dark); border-bottom: 1px solid var(--border);
  }
  .date-btn {
    background: none; border: 1px solid var(--border); color: var(--dim);
    border-radius: 3px; padding: 3px 10px; font-size: 13px; cursor: pointer; transition: all .15s;
  }
  .date-btn:hover { border-color: var(--white); color: var(--white); }
  #date-label {
    font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600;
    letter-spacing: .04em; color: var(--white); flex: 1; text-align: center;
  }
  .today-btn {
    font-size: 10px; color: var(--red); border-color: var(--red);
    padding: 3px 8px;
  }

  /* ══════════════════════════════════════════
     SECTION 1 — MAP
  ══════════════════════════════════════════ */
  #map-section { position: relative; }
  #map { height: 44vh; width: 100%; }


  /* ══════════════════════════════════════════
     SECTION 2 — STATUS CARDS
  ══════════════════════════════════════════ */
  #status-section { padding: 12px 14px; border-bottom: 2px solid var(--border); }
  #status-section-title {
    font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
    letter-spacing: .14em; text-transform: uppercase; color: var(--muted);
    margin-bottom: 10px;
  }
  #status-cards { display: flex; flex-direction: column; gap: 8px; }

  .status-card {
    background: var(--panel); border-bottom: 1px solid var(--border);
    padding: 16px 18px; display: grid;
    grid-template-columns: 80px 1px 130px 1px 1fr;
    align-items: center; gap: 0; min-height: 72px;
  }
  .sc-asset {
    font-family: 'Barlow Condensed', sans-serif; font-size: 36px; font-weight: 900;
    letter-spacing: -.5px; line-height: 1;
  }
  .sc-divider { width: 1px; background: var(--border); align-self: stretch; margin: 0 16px; }
  .sc-etr-label, .sc-orders-label {
    font-size: 10px; color: #666; text-transform: uppercase;
    letter-spacing: .12em; font-family: 'Barlow Condensed', sans-serif; margin-bottom: 3px;
  }
  .sc-etr-val {
    font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 700;
    line-height: 1; color: #ffffff;
  }
  .sc-order-item {
    font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 500;
    color: #ccc; line-height: 1.7; letter-spacing: .02em;
  }



  /* Loading / empty */
  .empty { padding: 40px 20px; text-align: center; color: var(--muted); font-size: 13px; }
  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid var(--border); border-top-color: var(--red);
    border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Truck label marker — floating text + arrow, no circle */
  .truck-label {
    display: flex; align-items: center; gap: 4px;
    cursor: pointer; white-space: nowrap;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,.9)) drop-shadow(0 0 6px rgba(0,0,0,.7));
  }
  .truck-label-text {
    font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700;
    letter-spacing: .04em; line-height: 1;
    text-shadow: 0 0 4px rgba(0,0,0,1), 1px 1px 0 rgba(0,0,0,1), -1px -1px 0 rgba(0,0,0,1);
  }
  .truck-label-arrow {
    font-size: 13px; line-height: 1; display: inline-block;
    text-shadow: 0 0 4px rgba(0,0,0,1);
    transition: transform .3s;
  }

</style>
</head>

<script>
'use strict';

const DB           = 'https://bccsms-27c55-default-rtdb.firebaseio.com';
const MAPBOX_TOKEN = 'pk.eyJ1IjoiYmVuc2dyZWF0b3V0ZG9vcnMiLCJhIjoiY21wbzBqdmh4MDB6ZjJybzhjNnhrdHphdyJ9.ppB9r_WJZwwT6u0lSO0xpw';
const YARD = { lng: -83.0857, lat: 43.3447 };
const YARD_RADIUS_MILES = 0.3;  // within 0.3 miles = at yard

function milesFromYard(lat, lng) {
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat - YARD.lat);
  const dLng = toRad(lng - YARD.lng);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(YARD.lat)) * Math.cos(toRad(lat)) * Math.sin(dLng/2)**2;
  return 3958.8 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function isAtYard(gpsLat, gpsLng, gpsStatus) {
  if (!gpsLat || !gpsLng) return false;
  if (gpsStatus === 'MOVING') return false;
  // Use last known position regardless of staleness — a parked truck
  // at the yard hours ago is still at the yard
  return milesFromYard(gpsLat, gpsLng) <= YARD_RADIUS_MILES;
}
const COLORS = ['#ff4444','#ff9900','#00ff88','#44aaff','#dd44ff','#00ffcc','#ff44aa','#ffee00','#00ddff','#ff6600'];

let map, dateOffset = 0, allMarkers = [], geocodeCache = {}, driveTimeCache = {}, lastLoadDay = null;

// ── Date ─────────────────────────────────────────────────────────────────
function todayStr(off = 0) {
  const d = new Date(); d.setDate(d.getDate() + off);
  return d.toISOString().slice(0, 10);
}
function fmtDate(iso) {
  const dt = new Date(iso + 'T12:00:00');
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const today = todayStr(0), tom = todayStr(1), yes = todayStr(-1);
  const tag = iso===today?'Today · ':iso===tom?'Tomorrow · ':iso===yes?'Yesterday · ':'';
  return `${tag}${days[dt.getDay()]} ${months[dt.getMonth()]} ${dt.getDate()}`;
}
function fmtTime(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    const h = d.getHours(), m = d.getMinutes();
    return `${h%12||12}:${String(m).padStart(2,'0')} ${h<12?'AM':'PM'}`;
  } catch { return ''; }
}
function shiftDate(n) { dateOffset += n; geocodeCache = {}; driveTimeCache = {}; updateDateLabel(); load(); }
function checkDayRollover() { const d = todayStr(0); if (lastLoadDay && lastLoadDay !== d) { geocodeCache = {}; driveTimeCache = {}; } lastLoadDay = d; }
function resetDate()  { dateOffset = 0;  geocodeCache = {}; updateDateLabel(); load(); }
function updateDateLabel() {
  document.getElementById('date-label').textContent = fmtDate(todayStr(dateOffset));
}

// ── Firebase ──────────────────────────────────────────────────────────────
async function dbGet(path) {
  const r = await fetch(`${DB}/${path}.json`);
  if (!r.ok) throw new Error(`DB ${r.status}`);
  return r.json();
}

// ── Geocode ───────────────────────────────────────────────────────────────
async function geocode(addr) {
  if (!addr) return null;
  // Normalize address — fix common DQ issues before geocoding
  let clean = addr.trim()
    .replace(/\s+/g, ' ')                          // collapse whitespace
    .replace(/,\s*MI\s*$/i, ', MI')               // normalize state
    .replace(/\bRD\.\s/gi, 'RD ')               // "RD." → "RD"
    .replace(/\bST\.\s/gi, 'ST ')               // "ST." → "ST"
    .replace(/\bDR\.\s/gi, 'DR ')               // "DR." → "DR"
    .replace(/\bAVE\.\s/gi, 'AVE ')             // "AVE." → "AVE"
    .replace(/\bHWY\.\s/gi, 'HWY ')             // "HWY." → "HWY"
    .replace(/N\.\s(?=\w)/g, 'N ')              // "N. " → "N "
    .replace(/S\.\s(?=\w)/g, 'S ')              // "S. " → "S "
    .replace(/E\.\s(?=\w)/g, 'E ')              // "E. " → "E "
    .replace(/W\.\s(?=\w)/g, 'W ')              // "W. " → "W "
    .replace(/([A-Z]+),([A-Z])/g, '$1, $2');       // fix missing space after comma
  // If address has no city/state, append Michigan
  if (!/,/.test(clean)) clean = clean + ', MI';
  if (geocodeCache[clean] !== undefined) return geocodeCache[clean];
  try {
    const url = `https://api.mapbox.com/geocoding/v5/mapbox.places/${encodeURIComponent(clean)}.json`
              + `?access_token=${MAPBOX_TOKEN}&country=US&limit=1&proximity=${YARD.lng},${YARD.lat}`;
    const j = await (await fetch(url)).json();
    const f = j.features?.[0];
    const result = f ? { lng: f.center[0], lat: f.center[1] } : null;
    geocodeCache[clean] = result;
    geocodeCache[addr] = result; // cache original too
    return result;
  } catch { geocodeCache[clean] = null; geocodeCache[addr] = null; return null; }
}

// ── Return ETA ────────────────────────────────────────────────────────────
async function getDriveMinutes(fromCoords, toCoords) {
  // Round to ~0.01 degree grid (~0.7mi) to increase cache hits
  const key = `${Math.round(fromCoords.lat*100)},${Math.round(fromCoords.lng*100)}->${Math.round(toCoords.lat*100)},${Math.round(toCoords.lng*100)}`;
  if (driveTimeCache[key] !== undefined) return driveTimeCache[key];
  try {
    const url = `https://api.mapbox.com/directions/v5/mapbox/driving`
              + `/${fromCoords.lng},${fromCoords.lat};${toCoords.lng},${toCoords.lat}`
              + `?access_token=${MAPBOX_TOKEN}&overview=false`;
    const j = await (await fetch(url)).json();
    const secs = j.routes?.[0]?.duration;
    const mins = secs ? Math.round(secs / 60) : null;
    driveTimeCache[key] = mins;
    return mins;
  } catch { return null; }
}

async function getReturnEta(lastStop) {
  // Use last completed stop address + completedAt time to anchor the ETR.
  // Uses DQ spatialData coords if available — eliminates geocoding.
  if (!lastStop || !lastStop.address) return null;
  try {
    const fromCoords = lastStop.coords
      ? { lat: lastStop.coords[0], lng: lastStop.coords[1] }
      : await geocode(lastStop.address);
    if (!fromCoords) return null;
    const driveMins = await getDriveMinutes(fromCoords, YARD);
    if (driveMins === null) return null;
    // Anchor: when the last stop was completed (or now if unknown)
    const anchor = lastStop.completedAt ? new Date(lastStop.completedAt) : new Date();
    const eta = new Date(anchor.getTime() + driveMins * 60000);
    // If ETR is in the past, show it as-is (truck should already be back)
    const h = eta.getHours(), m = eta.getMinutes();
    return `${h%12||12}:${String(m).padStart(2,'0')} ${h<12?'AM':'PM'}`;
  } catch { return null; }
}

// ── Map ───────────────────────────────────────────────────────────────────
function initMap() {
  mapboxgl.accessToken = MAPBOX_TOKEN;
  map = new mapboxgl.Map({
    container: 'map',
    style: 'mapbox://styles/mapbox/dark-v11',
    center: [YARD.lng, YARD.lat],
    zoom: 6,
    attributionControl: false,
  });
  map.addControl(new mapboxgl.NavigationControl({ showCompass: false }), 'top-right');
  // Yard marker — small labeled dot
  const yardEl = document.createElement('div');
  yardEl.style.cssText = 'font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:700;color:#C41230;text-shadow:0 0 3px #000,1px 1px 0 #000,-1px -1px 0 #000;cursor:default;white-space:nowrap';
  yardEl.textContent = '● YARD';
  new mapboxgl.Marker({ element: yardEl, anchor: 'center' })
    .setLngLat([YARD.lng, YARD.lat])
    .addTo(map);
}

function clearMarkers() { allMarkers.forEach(m => m.remove()); allMarkers = []; }


function directionArrow(degrees) {
  // Convert compass heading to a Unicode arrow character
  // 0=N, 90=E, 180=S, 270=W — rotate an up-arrow
  if (degrees == null) return '';
  // Use CSS rotation on an arrow character
  return degrees;
}

function addTruckMarker(coords, driver, asset, color, returnEta, allDone, gpsSpeed, gpsStatus, gpsDirection, gpsFuelLevel) {
  const labelColor = allDone ? '#888' : color;
  const label = asset || (driver || '?').split(' ')[0];

  const wrapper = document.createElement('div');
  wrapper.className = 'truck-label';

  // Direction arrow — rotated triangle using CSS, shown next to text
  if (gpsStatus === 'MOVING' && gpsDirection != null) {
    const arrow = document.createElement('span');
    arrow.className = 'truck-label-arrow';
    arrow.textContent = '▲';
    arrow.style.color = labelColor;
    // CSS rotation: 0deg = pointing up (North). Rotate clockwise by heading.
    arrow.style.transform = `rotate(${gpsDirection}deg)`;
    wrapper.appendChild(arrow);
  }

  const text = document.createElement('span');
  text.className = 'truck-label-text';
  text.textContent = label;
  text.style.color = labelColor;
  wrapper.appendChild(text);

  const etaHtml = returnEta
    ? `<div style="color:#f39c12;font-size:11px;margin-top:3px">🏠 ETR: ${returnEta}</div>`
    : allDone ? `<div style="color:#2ecc71;font-size:11px;margin-top:3px">✓ All done</div>` : '';
  const speedHtml = (gpsSpeed > 0 && gpsStatus === 'MOVING')
    ? `<div style="color:#aaa;font-size:11px;margin-top:2px">🚛 ${gpsSpeed} mph</div>` : '';
  const fuelHtml = '';

  wrapper.addEventListener('click', () => {
    new mapboxgl.Popup({ offset: 10, closeButton: false })
      .setLngLat([coords.lng, coords.lat])
      .setHTML(`<div style="font-family:'Barlow Condensed',sans-serif">
        <div style="font-weight:700;font-size:14px;color:${labelColor}">${label}</div>
        <div style="font-size:12px;color:#ccc">${driver || ''}</div>
        ${etaHtml}${speedHtml}
      </div>`)
      .addTo(map);
  });

  const marker = new mapboxgl.Marker({ element: wrapper, anchor: 'center' })
    .setLngLat([coords.lng, coords.lat]).addTo(map);
  allMarkers.push(marker);
}

// ── Build driver data ─────────────────────────────────────────────────────
function buildDrivers(routes, targetDate, gpsOnly) {
  const driverMap = {};
  for (const [routeId, route] of Object.entries(routes || {})) {
    if (!route || route.date !== targetDate) continue;
    if (routeId === 'UNASSIGNED') continue;  // skip unassigned — no truck to show
    const driver = route.driverName || '(Unassigned)';
    if (!driverMap[driver]) driverMap[driver] = [];
    driverMap[driver].push({ routeId, route });
  }
  const drivers = [];
  for (const [driver, list] of Object.entries(driverMap)) {
    list.sort((a, b) => parseInt(a.routeId) - parseInt(b.routeId));
    const asset = list[0]?.route?.asset || '';
    // Only mark at yard if the LAST route has timeIn OR GPS is at yard
    const lastRoute = list[list.length - 1]?.route;
    // timeIn not used — GPS-based yard detection only
    // GPS-based yard detection — more reliable than timeIn (DQ never sets it)
    // Check last known GPS across ALL rounds — use most recent reading
    let lastGpsLat = null, lastGpsLng = null, lastGpsStatus = '';
    let latestGpsUpdate = '';
    for (const r of list) {
      const upd = r.route?.gpsUpdatedAt || '';
      if (r.route?.gpsLat && r.route?.gpsLon && upd >= latestGpsUpdate) {
        lastGpsLat = r.route.gpsLat;
        lastGpsLng = r.route.gpsLon;
        lastGpsStatus = r.route.gpsStatus || '';
        latestGpsUpdate = upd;
      }
    }
    const gpsAtYard = isAtYard(lastGpsLat, lastGpsLng, lastGpsStatus);
    // tripStatus from last route only
    const lastTripStatus = lastRoute?.tripStatus || '';
    const tripStatus = lastTripStatus;
    const rounds = list.map((r, i) => {
      const stops = Object.values(r.route.stops || {})
        .sort((a, b) => (a.sequence||0) - (b.sequence||0));
      const done = stops.filter(s => s.status === 'complete').length;
      const currentIdx = stops.findIndex(s => s.status !== 'complete');
      return { routeId: r.routeId, round: i+1, stops, total: stops.length, done, currentIdx, route: r.route };
    });
    const totalStops  = rounds.reduce((a,r)=>a+r.total, 0);
    const totalDone   = rounds.reduce((a,r)=>a+r.done, 0);
    const totalWeight = list.reduce((a,r) => a + (parseFloat(r.route.tripWeight)||0), 0);
    drivers.push({ driver, asset, gpsAtYard, tripStatus, rounds, totalStops, totalDone, totalWeight });
  }
  // Add GPS-only assets (on road but no deliveries today)
  if (gpsOnly && targetDate === todayStr(0)) {
    const seenAssets = new Set(drivers.map(d => d.asset));
    for (const [assetNum, pos] of Object.entries(gpsOnly)) {
      if (!pos || pos.date !== targetDate) continue;
      if (seenAssets.has(assetNum)) continue;
      drivers.push({
        driver:      pos.driver || assetNum,
        asset:       assetNum,
        // no timeIn — GPS only
        tripStatus:  '',
        rounds:      [],
        totalStops:  0,
        totalDone:   0,
        totalWeight: 0,
        gpsOnly:     pos,  // raw GPS data
      });
    }
  }

  // Filter — only show drivers that are relevant right now
  const activeDrivers = drivers.filter(d => {
    if (d.gpsOnly) return true; // GPS-only assets always show

    const allRoundsDone = d.totalStops > 0 && d.rounds.every(r => r.done === r.total && r.total > 0);
    const hasActiveRound = d.rounds.some(r => r.route?.eTR && r.done < r.total);
    const hasNextRound   = d.rounds.some(r => r.total > 0 && r.done === 0 && !r.route?.eTR);
    const isReturning    = allRoundsDone && !d.gpsAtYard;

    // Hide only if fully done AND back at yard (or no stops at all)
    if (d.gpsAtYard && allRoundsDone) return false;
    if (d.totalStops === 0 && !d.gpsOnly) return false;

    return hasActiveRound || d.gpsAtYard || isReturning || hasNextRound;
  });

  activeDrivers.sort((a,b) => {
    if (a.driver==='(Unassigned)') return 1;
    if (b.driver==='(Unassigned)') return -1;
    return a.driver.localeCompare(b.driver);
  });
  return activeDrivers;
}

// ── Render status cards ───────────────────────────────────────────────────
function renderStatusCards(drivers) {
  const el = document.getElementById('status-cards');
  if (!drivers.length) { el.innerHTML = '<div class="empty">No routes for this date.</div>'; return; }
  el.innerHTML = drivers.map((d, di) => {
    const color   = COLORS[di % COLORS.length];
    const allDone = d.totalDone === d.totalStops && d.totalStops > 0;
    const etrLabel = d.gpsAtYard ? 'IN' : 'ETR';
    const etrVal   = d.gpsOnly ? '—' : d.gpsAtYard ? 'At Yard' : allDone ? '✓' : '—';
    const etrColor = d.gpsOnly ? '#888' : d.gpsAtYard ? '#2ecc71' : '#fff';
    return `
      <div class="status-card" id="sc-${di}">
        <div class="sc-asset" style="color:${color}">${d.asset || '—'}</div>
        <div class="sc-divider"></div>
        <div>
          <div class="sc-etr-label">${etrLabel}</div>
          <div class="sc-etr-val" id="sc-return-${di}" style="color:${etrColor}">${etrVal}</div>
        </div>
        <div class="sc-divider"></div>
        <div>
          <div class="sc-orders-label">Next Route</div>
          <div id="sc-orders-${di}"><span class="sc-order-item" style="color:var(--muted)">${d.gpsOnly ? 'No deliveries' : '—'}</span></div>
        </div>
      </div>`;
  }).join('');
}

// ── Render rounds & stops ─────────────────────────────────────────────────

// ── Map markers (async, runs after render) ────────────────────────────────
async function updateMap(drivers) {
  clearMarkers();
  const bounds = new mapboxgl.LngLatBounds();
  // Don't include yard in bounds — fit to truck positions only

  for (let di = 0; di < drivers.length; di++) {
    const d = drivers[di];
    const color = COLORS[di % COLORS.length];
    const allDone = d.totalDone === d.totalStops && d.totalStops > 0;
    let truckCoords = null;

    // GPS-only asset (no deliveries today — calculate ETR from GPS to yard)
    if (d.gpsOnly) {
      const pos = d.gpsOnly;
      const coords = { lat: pos.gpsLat, lng: pos.gpsLon };
      // Calculate ETR
      let gpsOnlyEtr = null;
      const gpsOnlyAge = pos.gpsUpdatedAt ? (Date.now() - new Date(pos.gpsUpdatedAt).getTime()) / 60000 : 999;
      const gpsOnlyStale = (pos.gpsStatus === 'MOVING') ? gpsOnlyAge > 10 : gpsOnlyAge > 120;
      if (!gpsOnlyStale) {
        const driveMins = await getDriveMinutes(coords, YARD);
        if (driveMins !== null) {
          const anchor = pos.gpsUpdatedAt ? new Date(pos.gpsUpdatedAt) : new Date();
          const eta = new Date(anchor.getTime() + driveMins * 60000);
          const h = eta.getHours(), m = eta.getMinutes();
          gpsOnlyEtr = `${h%12||12}:${String(m).padStart(2,'0')} ${h<12?'AM':'PM'}`;
        }
      }
      const retElGps = document.getElementById(`sc-return-${di}`);
      if (retElGps) { retElGps.textContent = gpsOnlyEtr || '—'; retElGps.style.color = '#fff'; }
      addTruckMarker(coords, d.driver, d.asset, color, gpsOnlyEtr, false,
        pos.gpsSpeed || 0, pos.gpsStatus || 'PARKED', pos.gpsDirection, pos.gpsFuelLevel);
      bounds.extend([coords.lng, coords.lat]);
      continue;
    }

    // GPS position — search ALL rounds for the most recent GPS reading
    const lastRoute = d.rounds[d.rounds.length - 1]?.route;
    let gpsLat = null, gpsLon = null, gpsUpdated = null, gpsSpeed = 0, gpsStatus = 'PARKED';
    let gpsDirection = null, gpsFuelLevel = null;
    for (const r of d.rounds) {
      const rLat = r.route?.gpsLat, rLon = r.route?.gpsLon, rUpd = r.route?.gpsUpdatedAt;
      if (rLat && rLon && rUpd) {
        if (!gpsUpdated || rUpd > gpsUpdated) {
          gpsLat = rLat; gpsLon = rLon; gpsUpdated = rUpd;
          gpsSpeed     = r.route?.gpsSpeed     || 0;
          gpsStatus    = r.route?.gpsStatus    || 'PARKED';
          gpsDirection = r.route?.gpsDirection ?? null;
          gpsFuelLevel = r.route?.gpsFuelLevel ?? null;
        }
      }
    }
    const gpsAge = gpsUpdated ? (Date.now() - new Date(gpsUpdated).getTime()) / 60000 : 999;
    // PARKED trucks update less frequently — allow up to 2 hours before considering stale
    const gpsStale = gpsStatus === 'MOVING' ? gpsAge > 10 : gpsAge > 120;

    if (gpsLat && gpsLon && !gpsStale) {
      truckCoords = { lng: gpsLon, lat: gpsLat };
    } else if (gpsLat && gpsLon && gpsStale) {
      const hasActiveRound = d.rounds.some(r => r.route?.eTR && r.done < r.total);
      if (hasActiveRound) {
        truckCoords = { lng: gpsLon, lat: gpsLat };
      }
    }
    // If GPS is stale and all stops are done, assume truck is back at yard
    const allRoundsDoneEarly = d.totalStops > 0 && d.rounds.every(r => r.done === r.total && r.total > 0);
    const atYard = d.gpsAtYard || (allRoundsDoneEarly && gpsStale);

    // Active round — declared here so it's available for both ETR and next-round logic
    const activeRoundIdx = d.rounds.findIndex(r => r.route?.eTR && r.done < r.total);

    // ETR — calculate from live GPS position to yard (most accurate)
    let returnEta = null;
    if (!atYard) {
      if (truckCoords) {
        // Best: drive time from current GPS position to yard
        const driveMins = await getDriveMinutes(truckCoords, YARD);
        if (driveMins !== null) {
          const eta = new Date(Date.now() + driveMins * 60000);
          const h = eta.getHours(), m = eta.getMinutes();
          returnEta = `${h%12||12}:${String(m).padStart(2,'0')} ${h<12?'AM':'PM'}`;
        }
      }

      // GPS fallback — use eTR from the active route when GPS drive-time fails
      if (!returnEta && activeRoundIdx !== -1) {
        const activeRoute = d.rounds[activeRoundIdx].route;
        if (activeRoute?.eTR) {
          const etrDate = new Date(activeRoute.eTR);
          if (!isNaN(etrDate)) {
            const h = etrDate.getHours(), m = etrDate.getMinutes();
            returnEta = `${h%12||12}:${String(m).padStart(2,'0')} ${h<12?'AM':'PM'}`;
          }
        }
      }
    }

    // Build next round order list
    let nextRound = null;
    if (activeRoundIdx !== -1) {
      nextRound = d.rounds.slice(activeRoundIdx + 1).find(r => r.total > 0 && r.done === 0) || null;
    }
    const nextOrders = nextRound
      ? nextRound.stops.filter(s => s.status !== 'skipped' && (s.deliveryStatus || '').toLowerCase() !== 'cancelled').map(s => s.orderNumber || s.customerName || '—').filter(Boolean)
      : [];

    const retEl = document.getElementById(`sc-return-${di}`);
    if (retEl && !d.gpsAtYard) {
      const returning = d.tripStatus === 'Returning';
      retEl.textContent = returning ? (returnEta || '…') : (returnEta || '—');
      retEl.style.color = returning ? '#f39c12' : '#fff';
    }

    // Next route orders
    const ordersEl = document.getElementById(`sc-orders-${di}`);
    if (ordersEl) {
      const showOrders = !atYard && nextOrders.length;
      ordersEl.innerHTML = showOrders
        ? nextOrders.map(o => `<div class="sc-order-item">${o}</div>`).join('')
        : `<span class="sc-order-item" style="color:var(--muted)">—</span>`;
    }


    if (atYard) {
      addTruckMarker(YARD, d.driver, d.asset, '#444', null, true, 0, 'PARKED', null, gpsFuelLevel);
    } else if (truckCoords) {
      addTruckMarker(truckCoords, d.driver, d.asset, color, returnEta, false, gpsSpeed, gpsStatus, gpsDirection, gpsFuelLevel);
      bounds.extend([truckCoords.lng, truckCoords.lat]);
    }
  }

  if (!bounds.isEmpty()) map.fitBounds(bounds, { padding: 80, maxZoom: 11, duration: 800 });

}

// ── Main load ─────────────────────────────────────────────────────────────
async function load() {
  checkDayRollover();
  const btn = document.getElementById('refresh-btn');
  btn.textContent = '↻ …';
  try {
    const target = todayStr(dateOffset);
    const [routesRaw, gpsOnly, reportSnap] = await Promise.all([
      dbGet('routes').catch(()=>({})),
      dbGet('gps_only').catch(()=>({})),
      fetch(`${DB}/reports/${target}.json`).then(r=>r.json()).catch(()=>null),
    ]);
    // Merge archived reports into routes for historical dates
    let routes = routesRaw || {};
    if (reportSnap && typeof reportSnap === 'object') {
      Object.entries(reportSnap).forEach(([rid, r]) => {
        if (!routes[rid]) routes[rid] = r; // use archive if live route is gone
      });
    }
    const drivers = buildDrivers(routes, target, gpsOnly || {});

    renderStatusCards(drivers);

    // Update meta
    const total = drivers.reduce((a,d)=>a+d.totalStops,0);
    const done  = drivers.reduce((a,d)=>a+d.totalDone,0);
    document.getElementById('hdr-meta').textContent = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) + ' · ' +
      `${drivers.length} trucks · ${done}/${total} stops`;

    // Geocode + place map markers (async)
    updateMap(drivers); // intentionally not awaited — updates map progressively
  } catch(e) {
    document.getElementById('status-cards').innerHTML = `<div class="empty">Error: ${e.message}</div>`;
  } finally {
    btn.textContent = '↻ Refresh';
  }
}

// ── Init ──────────────────────────────────────────────────────────────────
updateDateLabel();
initMap();
map.on('load', () => load());
setInterval(load, 120000);
</script>
