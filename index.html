<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1.0">
<title>BCC Dispatcher</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #fff; color: #111; font-family: 'Roboto', sans-serif; min-height: 100vh; }

/* ── Existing styles (unchanged) ── */
.dx-header { background: #111; border-bottom: 5px solid #cc0000; padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; }
.dx-brand img { height: 52px; width: auto; filter: invert(1); }
.dx-product-name { font-size: 20px; font-weight: 700; letter-spacing: 0.16em; color: #cc0000; }
.dx-input { font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 600; padding: 9px 12px; border: 1px solid #111; width: 100%; }
.dx-input:focus { outline: 0; border-color: #cc0000; }

/* Enhanced SMS styling */
.dx-sms-cell { font-family: 'Oswald', sans-serif; font-size: 12px; letter-spacing: 0.14em; }
.dx-sms-cell.sent { color: #111; font-weight: 600; }
.dx-sms-cell.queued { color: #cc0000; font-weight: 600; }
.dx-sms-fail { color: #cc0000; font-weight: 900; border: 2px solid #cc0000; padding: 2px 6px; border-radius: 3px; }

/* Photo thumbs if needed */
.dx-thumb { height: 60px; cursor: pointer; border: 2px solid #eee; margin: 2px; }
</style>
</head>
<body>

<div id="root"></div>

<script>
// ==================== FULL UPDATED DISPATCHER VIEW ====================

const TRACKER_BASE = "https://your-tracker-domain.com"; // Update as needed

let S = { authed: false, selected: null, dateOffset: 0 };

function esc(s) { 
  return String(s || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"})[m]); 
}

function fmtTime(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
}

function renderPin() {
  document.getElementById('root').innerHTML = `
    <div class="dx-login-shell">
      <div class="dx-login">
        <div class="dx-login-brand">
          <span class="dx-login-product">BCC Dispatch</span>
          <span class="dx-login-sub">Dispatcher View</span>
        </div>
        <div class="dx-login-form">
          <div class="dx-login-form-head">Enter Employee ID</div>
          <div class="dx-login-field">
            <label for="dx-pin">Employee ID</label>
            <input id="dx-pin" class="dx-input" type="text" inputmode="numeric" placeholder="Enter ID" autocomplete="off">
          </div>
          <div id="dx-pin-err" class="dx-login-error" style="display:none;color:#cc0000">Invalid employee ID.</div>
          <button id="dx-pin-btn" class="dx-action-btn primary full">Sign In</button>
        </div>
      </div>
    </div>`;

  const input = document.getElementById('dx-pin');
  const errEl = document.getElementById('dx-pin-err');

  function attempt() {
    const pin = input.value.trim();
    // Add your actual auth logic here
    if (pin.length > 0) {  // Placeholder - replace with real check
      S.authed = true;
      renderApp();
    } else {
      errEl.style.display = 'block';
      input.focus();
    }
  }

  document.getElementById('dx-pin-btn').onclick = attempt;
  input.addEventListener('keydown', e => { if (e.key === 'Enter') attempt(); });
  input.focus();
}

function renderApp() {
  document.getElementById('root').innerHTML = `
    <!-- Your full header, subbar, main content here -->
    <header class="dx-header">
      <div class="dx-brand">...</div>
      <div class="dx-user">
        <span>Dispatcher</span>
        <button id="dx-lock-btn" class="dx-signout-btn">Sign Out</button>
      </div>
    </header>

    <div class="dx-subbar"> ... date nav and stats ... </div>

    <main class="dx-main" id="dx-routes"></main>

    <div id="dx-drawer-wrap" style="display:none"></div>
  `;

  document.getElementById('dx-lock-btn').onclick = () => {
    S.authed = false;
    renderPin();
  };

  // Render routes with enhanced driver name and SMS
  renderRoutes();
}

// Enhanced SMS Cell with Day-Before / Day-Of + Link
function smsCellHTML(sms, queued, token) {
  const url = `${TRACKER_BASE}/?token=${esc(token || '')}`;
  
  if (queued) return `<span class="dx-sms-cell queued">Queued</span>`;
  if (sms?.fail) return `<span class="dx-sms-fail">FAILED</span>`;
  
  if (sms?.advance) {
    return `<span class="dx-sms-cell sent">Day Before ✓ <a href="${url}" target="_blank" style="color:#cc0000;font-size:11px">View</a></span>`;
  }
  if (sms?.at) {
    return `<span class="dx-sms-cell sent">Sent ${fmtTime(sms.at)} <a href="${url}" target="_blank" style="color:#cc0000;font-size:11px">View</a></span>`;
  }
  return `<span class="dx-sms-cell">—</span>`;
}

// Enhanced route rendering with driver name
function routeBlockHTML(r) {
  return `
    <section class="dx-route">
      <div class="dx-route-head">
        <div class="dx-route-head-left">
          <span class="dx-route-id">Route <b>${esc(r.id)}</b></span>
          <span class="dx-route-meta">
            ${r.driverName ? `Driver <b>${esc(r.driverName)}</b>` : 'No Driver Assigned'}
            &middot; Unit <b>${esc(r.assetDescription || r.asset || '—')}</b>
          </span>
        </div>
        <!-- progress bar -->
      </div>
      <table class="dx-table"> ... </table>
    </section>`;
}

// In your stopRowHTML function, use the enhanced smsCellHTML
// Example:
<td>${smsCellHTML(s.smsSent, false, s.token)}</td>

// Drawer enhancements already include better SMS display with links

renderPin();
</script>
</body>
</html>
