<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>BCC Delivery Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://api.mapbox.com; worker-src blob:; child-src blob:; img-src 'self' data: blob: https://*.mapbox.com; connect-src 'self' https://*.mapbox.com https://bccsms-27c55-default-rtdb.firebaseio.com https://events.mapbox.com; style-src 'self' 'unsafe-inline' https://api.mapbox.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:;">
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d;
      background-image:
        radial-gradient(circle at 10% 0%, rgba(196, 18, 48, 0.06) 0%, transparent 35%),
        radial-gradient(circle at 90% 100%, rgba(196, 18, 48, 0.04) 0%, transparent 40%);
      background-attachment: fixed;
      font-family: 'Barlow', sans-serif;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── HEADER ── */
    header {
      width: 100%;
      background: linear-gradient(180deg, #1a1a1a 0%, #0f0f0f 100%);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 4px solid #C41230;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }
    header::after {
      content: '';
      position: absolute;
      bottom: 4px;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(196,18,48,0.4) 50%, transparent 100%);
      z-index: 2;
    }
    .truss-accent {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 460px;
      max-width: 80%;
      height: 70px;
      opacity: 0.10;
      pointer-events: none;
      z-index: 0;
    }
    .header-logo {
      height: 56px;
      width: auto;
      position: relative;
      z-index: 1;
    }
    .header-right { text-align: right; position: relative; z-index: 1; }
    .header-title {
      font-family: 'Oswald', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #C41230;
      text-shadow: 0 0 20px rgba(196, 18, 48, 0.4);
    }
    .header-sub {
      font-size: 11px;
      color: #aaa;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    main { width: 100%; max-width: 520px; padding: 28px 20px 90px; }

    /* ── ORDER PILL ── */
    .order-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, #222 0%, #1a1a1a 100%);
      border: 1px solid #333;
      border-left: 3px solid #C41230;
      padding: 6px 16px;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 22px;
    }
    .order-pill b {
      color: #fff;
      font-weight: 700;
      letter-spacing: 0.08em;
      font-family: 'Oswald', sans-serif;
      font-size: 13px;
    }

    /* ── STATUS ── */
    .status-label {
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-label::before {
      content: '';
      display: inline-block;
      width: 18px;
      height: 1px;
      background: #C41230;
    }
    .status-text {
      font-family: 'Oswald', sans-serif;
      font-size: 42px;
      font-weight: 700;
      line-height: 1.05;
      color: #fff;
      margin-bottom: 8px;
      letter-spacing: 0.01em;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }
    .status-text.red {
      color: #ff2d4a;
      text-shadow: 0 0 24px rgba(196, 18, 48, 0.4);
    }
    .status-text.green {
      color: #4ade80;
      text-shadow: 0 0 24px rgba(74, 222, 128, 0.3);
    }
    .status-text.scheduled { color: #cbd5e0; }
    .status-sub { font-size: 13px; color: #aaa; margin-bottom: 26px; line-height: 1.5; }

    /* ── ETA BLOCK ── */
    .eta-block {
      background: linear-gradient(135deg, #C41230 0%, #9a0e25 100%);
      padding: 22px 22px 20px;
      margin-bottom: 22px;
      border-radius: 2px;
      box-shadow: 0 6px 24px rgba(196, 18, 48, 0.25), inset 0 1px 0 rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }
    .eta-block::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 80px; height: 80px;
      background: radial-gradient(circle, rgba(255,255,255,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .eta-block.stale {
      background: linear-gradient(135deg, #3a3a3a 0%, #2a2a2a 100%);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .eta-label {
      font-size: 10px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
      margin-bottom: 8px;
      font-weight: 600;
      position: relative;
      z-index: 1;
    }
    .eta-time {
      font-family: 'Oswald', sans-serif;
      font-size: 36px;
      font-weight: 700;
      color: #fff;
      line-height: 1;
      margin-bottom: 6px;
      letter-spacing: 0.01em;
      position: relative;
      z-index: 1;
    }
    .eta-time.updating { font-size: 24px; }
    .eta-note {
      font-size: 12px;
      color: rgba(255,255,255,0.85);
      position: relative;
      z-index: 1;
    }

    /* ── PROGRESS ── */
    .progress-wrap { margin-bottom: 24px; }
    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 10px;
    }
    .progress-header .pct {
      font-family: 'Oswald', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.02em;
    }
    .progress-bar {
      height: 5px;
      background: #1f1f1f;
      border-radius: 3px;
      overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.5);
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #9a0e25 0%, #C41230 60%, #ff2d4a 100%);
      box-shadow: 0 0 12px rgba(196, 18, 48, 0.5);
      transition: width 0.9s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 3px;
    }

    /* ── INFO CARD ── */
    .info-card {
      background: linear-gradient(180deg, #1e1e1e 0%, #181818 100%);
      border: 1px solid #2a2a2a;
      border-radius: 2px;
      padding: 0 20px;
      margin-bottom: 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.3);
    }
    .info-card-label {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #999;
      padding: 14px 0 10px;
      border-bottom: 1px solid #2a2a2a;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .info-card-label::before {
      content: '';
      display: inline-block;
      width: 14px;
      height: 1px;
      background: #C41230;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #252525;
    }
    .info-row:last-child { border-bottom: none; }
    .info-key {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #999;
      flex-shrink: 0;
    }
    .info-val {
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
      text-align: right;
      max-width: 65%;
      line-height: 1.4;
    }

    /* ── LOADING ── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      margin-top: 100px;
    }
    .spinner {
      width: 42px;
      height: 42px;
      border: 3px solid #2a2a2a;
      border-top-color: #C41230;
      border-right-color: #C41230;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      box-shadow: 0 0 20px rgba(196,18,48,0.3);
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      color: #aaa;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* ── ERROR ── */
    .error-state {
      text-align: center;
      margin-top: 90px;
      padding: 0 24px;
    }
    .error-code {
      font-family: 'Oswald', sans-serif;
      font-size: 96px;
      color: #2a2a2a;
      margin-bottom: 14px;
      line-height: 1;
      text-shadow: 0 0 30px rgba(196, 18, 48, 0.1);
    }
    .error-msg {
      color: #aaa;
      font-size: 14px;
      line-height: 1.7;
    }

    /* ── REFRESH BAR ── */
    .refresh-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(180deg, #1a1a1a 0%, #0f0f0f 100%);
      border-top: 1px solid #2a2a2a;
      padding: 12px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: #aaa;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      box-shadow: 0 -4px 16px rgba(0,0,0,0.4);
      backdrop-filter: blur(8px);
    }
    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #C41230;
      box-shadow: 0 0 8px rgba(196,18,48,0.7);
      animation: blink 2s ease infinite;
      margin-right: 8px;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.85); }
    }

    /* ── ENTRANCE ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .a1 { animation: fadeUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) 0.05s both; }
    .a2 { animation: fadeUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) 0.14s both; }
    .a3 { animation: fadeUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) 0.22s both; }
    .a4 { animation: fadeUp 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) 0.30s both; }

    /* ── PHOTO BUTTONS ── */
    .photo-btn {
      color: #ff2d4a !important;
      font-weight: 700;
      margin: 0 6px 4px 0;
      background: rgba(196, 18, 48, 0.1);
      border: 1px solid rgba(196, 18, 48, 0.3) !important;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px !important;
      text-decoration: none !important;
      padding: 4px 10px !important;
      border-radius: 2px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: all 0.15s ease;
    }
    .photo-btn:hover {
      background: rgba(196, 18, 48, 0.2) !important;
      border-color: #C41230 !important;
    }
    .bcc-lb-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.92); z-index:9999; display:none; align-items:center; justify-content:center; flex-direction:column; }
    .bcc-lb-overlay.open { display:flex; }
    .bcc-lb-img { max-width:90vw; max-height:80vh; object-fit:contain; border:2px solid #333; cursor:zoom-in; transition:transform .15s ease; transform-origin:center center; user-select:none; }
    .bcc-lb-img.zoomed { cursor:zoom-out; }
    .bcc-lb-nav { display:flex; align-items:center; gap:24px; margin-top:16px; }
    .bcc-lb-btn { background:#C41230; color:#fff; border:none; font-family:inherit; font-size:13px; font-weight:700; padding:6px 18px; cursor:pointer; border-radius:3px; }
    .bcc-lb-btn:disabled { background:#444; cursor:default; }
    .bcc-lb-counter { font-size:13px; color:#aaa; min-width:60px; text-align:center; }
    .bcc-lb-close { position:absolute; top:16px; right:20px; color:#aaa; font-size:28px; cursor:pointer; line-height:1; background:none; border:none; }
    .bcc-lb-close:hover { color:#fff; }
  #mini-map-wrap {
    width: 100%; height: 200px; border-radius: 12px; overflow: hidden;
    margin-bottom: 14px; position: relative;
    border: 1px solid rgba(255,255,255,0.08);
  }
  #mini-map { width: 100%; height: 100%; }
  #mini-map-label {
    position: absolute; bottom: 8px; left: 8px; z-index: 5;
    background: rgba(0,0,0,.7); border-radius: 6px; padding: 4px 10px;
    font-size: 11px; color: #ccc; font-family: 'Barlow', sans-serif;
    backdrop-filter: blur(4px);
  }
  </style>
</head>

<div class="refresh-bar" id="refresh-bar" style="display:none;">
  <div><span class="dot"></span>Live tracking active</div>
  <div id="countdown-label">Refreshes in 90s</div>
</div>

<script>
  const DB = 'https://bccsms-27c55-default-rtdb.firebaseio.com';
  const MAPBOX_TOKEN = 'pk.eyJ1IjoiYmVuc2dyZWF0b3V0ZG9vcnMiLCJhIjoiY21wbzBqdmh4MDB6ZjJybzhjNnhrdHphdyJ9.ppB9r_WJZwwT6u0lSO0xpw';

  async function fbGet(path) {
    const res = await fetch(`${DB}/${path}.json`);
    if (!res.ok) throw new Error(`Firebase ${res.status}`);
    return res.json();
  }

  const token = new URLSearchParams(window.location.search).get('token');
  let cdTimer, secondsLeft = 90;

  const fmt = d => d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });

  async function loadDelivery() {
    try {
      const tokenData = await fbGet(`tokens/${token}`);
      if (!tokenData) return showError('Tracking link not found.');

      const { routeId, stopId } = tokenData;
      const route = await fbGet(`routes/${routeId}`);
      if (!route) return showError('Route data not available.');

      const stop = route.stops[stopId];
      if (!stop) return showError('Stop not found.');

      const allStops   = Object.values(route.stops);
      const stopsAhead = allStops.filter(s => s.sequence < stop.sequence && s.status !== 'complete' && s.status !== 'skipped').length;

      // GPS data from poller
      const gpsLat    = route.gpsLat;
      const gpsLon    = route.gpsLon;
      const gpsSpeed  = route.gpsSpeed || 0;
      const gpsStatus = route.gpsStatus || 'PARKED';
      const gpsAge    = route.gpsUpdatedAt ? (Date.now() - new Date(route.gpsUpdatedAt).getTime()) / 60000 : 999;
      const hasLiveGps = gpsLat && gpsLon && (gpsStatus === 'MOVING' ? gpsAge < 10 : gpsAge < 120);

      // Miles from truck to this stop
      let milesAway = null;
      if (hasLiveGps && stop.coords && stop.coords.length === 2 && stop.status !== 'complete') {
        const toRad = d => d * Math.PI / 180;
        const dLat = toRad(stop.coords[0] - gpsLat);
        const dLon = toRad(stop.coords[1] - gpsLon);
        const a = Math.sin(dLat/2)**2 + Math.cos(toRad(gpsLat)) * Math.cos(toRad(stop.coords[0])) * Math.sin(dLon/2)**2;
        const miles = 3958.8 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        if (miles >= 0.1) milesAway = miles < 10 ? miles.toFixed(1) : Math.round(miles);
      }
      const total      = allStops.filter(s => s.status !== 'skipped').length;
      const mySeq      = stop.sequence || 0;
      const completed  = allStops.filter(s => s.status === 'complete' && (s.sequence || 0) < mySeq).length;

      let pct;
      if (stop.status === 'complete') {
        pct = 100;
      } else {
        const base = total > 0 ? (completed / total) : 0;
        const ds   = (stop.deliveryStatus || '').toLowerCase();
        const bump = ds.includes('arrived')   ? 0.75 / total :
                     (ds.includes('next stop') || ds.includes('enroute') || ds.includes('en route')) ? 0.5 / total : 0;
        pct = Math.min(99, Math.round((base + bump) * 100));
      }

      let etaLow, etaHigh, etaNote;

      function parseEtaStr(s) {
        if (!s) return null;
        const d = new Date(s);
        if (!isNaN(d)) return d;
        const m = s.replace(/\s/g,'').match(/^(\d{1,2}):?(\d{2})(AM|PM)$/i);
        if (!m) return null;
        let h = parseInt(m[1]), min = parseInt(m[2]);
        const pm = m[3].toUpperCase() === 'PM';
        if (pm && h !== 12) h += 12;
        if (!pm && h === 12) h = 0;
        const now = new Date();
        return new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, min, 0);
      }

      if (stop.etaOverridden && stop.customerEta) {
        const eta = stop.customerEta;
        if (eta.low) {
          etaLow  = parseEtaStr(eta.low);
          etaHigh = parseEtaStr(eta.high || eta.low);
          if (etaHigh && etaLow && etaHigh <= etaLow) etaHigh = new Date(etaLow.getTime() + 30*60000);
        } else {
          const mid = new Date(eta);
          etaLow  = new Date(mid.getTime() - 30 * 60000);
          etaHigh = new Date(mid.getTime() + 30 * 60000);
        }
        etaNote = 'Estimated window — updates as route progresses';
      } else if (stop.seedEta || stop.calculatedEta) {
        const mid = new Date(stop.seedEta || stop.calculatedEta);
        // Don't show stale ETA windows more than 2 hours in the past
        if (mid.getTime() > Date.now() - 2 * 60 * 60000) {
          etaLow  = new Date(mid.getTime() - 30 * 60000);
          etaHigh = new Date(mid.getTime() + 30 * 60000);
          etaNote = 'Estimated window — updates as route progresses';
        }
      } else {
        const avg     = route.avgServiceMinutes || 35;
        const baseMin = stopsAhead * avg;
        etaLow  = new Date(Date.now() + Math.max(0, baseMin - 15) * 60000);
        etaHigh = new Date(Date.now() + (baseMin + 25) * 60000);
        etaNote = 'Estimated window — updates as route progresses';
      }

      // If ETA window is entirely in the past, widen it forward from now
      if (etaHigh && etaHigh < new Date()) {
        const avg = route.avgServiceMinutes || 35;
        etaLow  = new Date();
        etaHigh = new Date(Date.now() + avg * 60000);
        etaNote = 'Arrival expected soon — window updated';
      }
      render({ route, stop, stopsAhead, etaLow, etaHigh, etaNote, completed, total, pct, gpsSpeed, gpsStatus, milesAway, hasLiveGps });
    } catch (err) {
      console.error(err);
      showError('Connection error — retrying…');
    }
  }

  let miniMap = null;

  function initMiniMap(truckCoords, stopCoords) {
    // truckCoords: {lat, lng} or null — live GPS position
    // stopCoords: {lat, lng} or null — delivery address from spatialData
    if (!truckCoords && !stopCoords) return;

    // Clean up any existing map
    if (miniMap) { miniMap.remove(); miniMap = null; }

    const center = truckCoords || stopCoords;
    mapboxgl.accessToken = MAPBOX_TOKEN;
    miniMap = new mapboxgl.Map({
      container: 'mini-map',
      style: 'mapbox://styles/mapbox/dark-v11',
      center: [center.lng, center.lat],
      zoom: 11,
      interactive: false,
      attributionControl: false,
    });

    miniMap.on('load', () => {
      // Truck marker — moving truck label
      if (truckCoords) {
        const truckEl = document.createElement('div');

  function render({ route, stop, stopsAhead, etaLow, etaHigh, etaNote, completed, total, pct, gpsSpeed, gpsStatus, milesAway, hasLiveGps }) {
    const todayYMD    = new Date().toISOString().slice(0, 10);
    const isTomorrow  = route.date && route.date > todayYMD;
    const delivered   = stop.status === 'complete';
    const ds          = (stop.deliveryStatus || '').toLowerCase();
    const arrived     = !delivered && ds.includes('arrived');
    const enroute     = !delivered && !arrived && (ds.includes('enroute') || ds.includes('en route') || ds.includes('next stop') || ds.includes('out for delivery'));
    const isNext      = !delivered && !arrived && (stopsAhead === 0 || enroute);

    const orderPill = `<div class="order-pill a1">Order <b>${stop.orderNumber || '—'}</b></div>`;

    let statusHTML;
    if (isTomorrow && !delivered) {
      statusHTML = `<div class="a1">
        <div class="status-label">Status</div>
        <div class="status-text scheduled">Your delivery<br>is scheduled</div>
        <div class="status-sub">Scheduled for tomorrow — estimated window below</div>
      </div>`;
    } else if (delivered) {
      const ts = stop.completedAt ? fmt(new Date(stop.completedAt)) : '';
      statusHTML = `<div class="a1">
        <div class="status-label">Status</div>
        <div class="status-text green">Your delivery<br>is complete ✓</div>
        ${ts ? `<div class="status-sub">Completed at ${ts}</div>` : ''}
      </div>`;
    } else if (arrived) {
      statusHTML = `<div class="a1">
        <div class="status-label">Status</div>
        <div class="status-text green">Your delivery<br>has arrived</div>
        <div class="status-sub">Driver is on site</div>
      </div>`;
    } else if (isNext) {
      const speedSub = milesAway
        ? `Next stop — approximately ${milesAway} miles away`
        : 'Next stop — driver heading to you now';
      statusHTML = `<div class="a1">
        <div class="status-label">Status</div>
        <div class="status-text red">Your delivery<br>is on the way</div>
        <div class="status-sub">${speedSub}</div>
      </div>`;
    } else {
      const milesStr = milesAway ? `Approximately ${milesAway} miles away` : 'Your delivery is on the way';
      statusHTML = `<div class="a1">
        <div class="status-label">Status</div>
        <div class="status-text red">Your delivery<br>is on the way</div>
        <div class="status-sub">${milesStr}</div>
      </div>`;
    }

    // ── ETA — hide if window has passed and not overridden ──
    let etaHTML = '';
    if (!delivered && !arrived) {
      etaHTML = `<div class="eta-block a2">
        <div class="eta-label">Estimated Arrival</div>
        <div class="eta-time">${fmt(etaLow)} – ${fmt(etaHigh)}</div>
        <div class="eta-note">${etaNote}</div>
      </div>`;
    }

    const progressHTML = `<div class="progress-wrap a3">
      <div class="progress-header">
        <span>Delivery Progress</span>
        <span class="pct">${pct}%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>`;

    const driverName = route.driverName ? route.driverName.split(' ')[0] : '—';
    const pics = (stop.pictures || []).concat(stop.signatures || []);
    const photoHTML = pics.length > 0 ? `
      <div class="info-row">
        <span class="info-key">Delivery Photos</span>
        <span class="info-val">
          ${pics.map((url, i) => `<button class="photo-btn" onclick='lbOpen(${JSON.stringify(pics)},${i})'>Photo ${i+1}</button>`).join('')}
        </span>
      </div>` : '';

    const jobName = stop.customerName && stop.customerName.trim() ? stop.customerName.trim() : '';
    const infoHTML = `<div class="info-card a4">
      <div class="info-card-label">Delivery Info</div>
      ${jobName ? `<div class="info-row">
        <span class="info-key">Ship To</span>
        <span class="info-val">${esc(jobName)}</span>
      </div>` : ''}
      <div class="info-row">
        <span class="info-key">Order #</span>
        <span class="info-val">${stop.orderNumber || '—'}</span>
      </div>
      <div class="info-row">
        <span class="info-key">Address</span>
        <span class="info-val">${stop.address || '—'}</span>
      </div>
      <div class="info-row">
        <span class="info-key">Truck</span>
        <span class="info-val">${[route.asset, route.assetDescription].filter(Boolean).join(' ') || '—'}</span>
      </div>
      ${photoHTML}
    </div>`;

    // Mini-map — show when not delivered, have GPS or stop coords
    const stopCoords = stop.coords && stop.coords.length === 2
      ? { lat: stop.coords[0], lng: stop.coords[1] } : null;
    const truckCoordsForMap = hasLiveGps && !delivered
      ? { lat: route.gpsLat, lng: route.gpsLon } : null;
    const showMap = !delivered && (truckCoordsForMap || stopCoords);
    const mapLabel = truckCoordsForMap
      ? (milesAway ? `Driver is approx. ${milesAway} miles away` : 'Live truck location')
      : 'Delivery address';
    const mapHTML = showMap
      ? `<div id="mini-map-wrap" class="a2b"><div id="mini-map"></div><div id="mini-map-label">${mapLabel}</div></div>`
      : '';

    document.getElementById('app').innerHTML = orderPill + statusHTML + mapHTML + etaHTML + progressHTML + infoHTML;
    document.getElementById('refresh-bar').style.display = delivered ? 'none' : 'flex';

    // Init map after DOM is ready
    if (showMap) {
      requestAnimationFrame(() => initMiniMap(truckCoordsForMap, stopCoords));
    } else if (miniMap) {
      miniMap.remove(); miniMap = null;
    }
  }

  function showError(msg) {
    document.getElementById('app').innerHTML = `<div class="error-state">
      <div class="error-code">?</div>
      <div class="error-msg">${msg}<br><br>Contact your sales rep if the problem continues.</div>
    </div>`;
  }

  function startCountdown() {
    secondsLeft = 90;
    clearInterval(cdTimer);
    cdTimer = setInterval(() => {
      const el = document.getElementById('countdown-label');
      if (el) el.textContent = `Refreshes in ${--secondsLeft}s`;
      if (secondsLeft <= 0) secondsLeft = 90;
    }, 1000);
  }

  if (!token) {
    // Demo mode — show sample data so the layout can be previewed
    const now = new Date();
    const demoLow  = new Date(now.getTime() + 25 * 60000);
    const demoHigh = new Date(now.getTime() + 55 * 60000);
    render({
      route: {
        driverName: 'Gary Rogers',
        asset: '537',
        assetDescription: 'Boom',
        date: now.toISOString().slice(0, 10)
      },
      stop: {
        orderNumber: 'C73335',
        customerName: 'Dave Scourtes',
        address: '5066 Lakeshore Rd, Fort Gratiot, MI',
        status: 'pending',
        deliveryStatus: 'Next Stop',
        sequence: 2,
        pictures: [],
        signatures: []
      },
      stopsAhead: 0,
      etaLow: demoLow,
      etaHigh: demoHigh,
      etaNote: 'DEMO MODE — sample data shown',
      completed: 1,
      total: 3,
      pct: 58
    });
  } else {
    loadDelivery();
    startCountdown();
    setInterval(() => { loadDelivery(); startCountdown(); }, 90000);
  }

let _lbUrls = [], _lbIdx = 0;
function lbOpen(urls, idx) { _lbUrls = urls; _lbIdx = idx; document.getElementById('bcc-lb').classList.add('open'); lbRender(); }
function lbClose() { document.getElementById('bcc-lb').classList.remove('open'); }
function lbPrev() { if (_lbIdx > 0) { _lbIdx--; lbRender(); } }
function lbNext() { if (_lbIdx < _lbUrls.length-1) { _lbIdx++; lbRender(); } }
document.addEventListener('keydown', function(e) {
  if (!document.getElementById('bcc-lb').classList.contains('open')) return;
  if (e.key === 'ArrowLeft') lbPrev();
  if (e.key === 'ArrowRight') lbNext();
  if (e.key === 'Escape') lbClose();
});
let _lbScale=1, _lbPinchDist=null;
function lbResetZoom(){ _lbScale=1; const img=document.getElementById('bcc-lb-img'); if(img){ img.style.transform='scale(1)'; img.classList.remove('zoomed'); } }
function lbRender(){ document.getElementById('bcc-lb-img').src=_lbUrls[_lbIdx]; document.getElementById('bcc-lb-counter').textContent=(_lbIdx+1)+' / '+_lbUrls.length; document.getElementById('bcc-lb-prev').disabled=_lbIdx===0; document.getElementById('bcc-lb-next').disabled=_lbIdx===_lbUrls.length-1; lbResetZoom(); }
document.addEventListener('wheel', function(e){ const img=document.getElementById('bcc-lb-img'); if(!document.getElementById('bcc-lb').classList.contains('open')||!img) return; e.preventDefault(); _lbScale=Math.min(5, Math.max(1, _lbScale-(e.deltaY>0?0.2:-0.2))); img.style.transform='scale('+_lbScale+')'; img.classList.toggle('zoomed',_lbScale>1); },{passive:false});
document.addEventListener('click', function(e){ if(e.target.id!=='bcc-lb-img') return; if(_lbScale>1){ lbResetZoom(); } else{ _lbScale=2.5; e.target.style.transform='scale(2.5)'; e.target.classList.add('zoomed'); } });
document.addEventListener('touchstart', function(e){ if(!document.getElementById('bcc-lb').classList.contains('open')) return; if(e.touches.length===2){ const dx=e.touches[0].clientX-e.touches[1].clientX; const dy=e.touches[0].clientY-e.touches[1].clientY; _lbPinchDist=Math.hypot(dx,dy); } },{passive:true});
document.addEventListener('touchmove', function(e){ if(!document.getElementById('bcc-lb').classList.contains('open')||!_lbPinchDist) return; if(e.touches.length===2){ const dx=e.touches[0].clientX-e.touches[1].clientX; const dy=e.touches[0].clientY-e.touches[1].clientY; const dist=Math.hypot(dx,dy); _lbScale=Math.min(5, Math.max(1, _lbScale*(dist/_lbPinchDist))); _lbPinchDist=dist; const img=document.getElementById('bcc-lb-img'); if(img){ img.style.transform='scale('+_lbScale+')'; img.classList.toggle('zoomed',_lbScale>1); } } },{passive:true});
document.addEventListener('touchend', function(){ _lbPinchDist=null; },{passive:true});
</script>

<div id="bcc-lb" class="bcc-lb-overlay" onclick="if(event.target===this)lbClose()">
  <button class="bcc-lb-close" onclick="lbClose()">&#x2715;</button>
  <img id="bcc-lb-img" class="bcc-lb-img" src="" alt="Delivery Photo">
  <div class="bcc-lb-nav">
    <button class="bcc-lb-btn" id="bcc-lb-prev" onclick="lbPrev()">&#8592; Prev</button>
    <span class="bcc-lb-counter" id="bcc-lb-counter"></span>
    <button class="bcc-lb-btn" id="bcc-lb-next" onclick="lbNext()">Next &#8594;</button>
  </div>
</div>
