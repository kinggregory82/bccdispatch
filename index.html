<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BCC Dispatcher</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --red:#8B1A1A; --red-bright:#C41230; --dark:#f5f5f0; --surface:#ffffff;
  --surface2:#f0ede8; --border:#ddd; --muted:#999; --dim:#777; --text:#1a1a1a;
  --green:#16a34a; --amber:#d97706; --blue:#2563eb;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--dark);color:var(--text);font-family:'Inter',sans-serif;font-size:13px}
body{display:flex;flex-direction:column}
#hdr{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:12px;padding:0 16px;height:48px;background:#fff;border-bottom:2px solid var(--red-bright)}
#hdr-title{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--red-bright)}
#hdr-sub{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
#hdr-spacer{flex:1}
#hdr-right{display:flex;align-items:center;gap:8px}
#hdr-user{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim)}
#hdr-user span{color:var(--text);font-weight:600}
.hdr-badge{background:var(--red-bright);color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-size:13px;font-weight:700}
.lock-btn{background:none;border:1px solid var(--border);color:var(--dim);border-radius:3px;padding:4px 10px;font-size:10px;cursor:pointer;font-family:'Oswald',sans-serif;letter-spacing:.08em;text-transform:uppercase;transition:all .15s}
.lock-btn:hover{border-color:var(--text);color:var(--text)}
#statbar{display:flex;align-items:center;gap:0;padding:0 16px;height:52px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto}
.date-nav{display:flex;align-items:center;gap:6px;margin-right:20px;flex-shrink:0}
.date-nav button{background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px;padding:4px;transition:color .15s;line-height:1}
.date-nav button:hover{color:var(--text)}
#date-label{font-family:'Oswald',sans-serif;font-size:15px;font-weight:600;letter-spacing:.04em;color:var(--text);white-space:nowrap;min-width:130px;text-align:center}
.stat-divider{width:1px;background:var(--border);height:28px;margin:0 16px;flex-shrink:0}
.dx-stat{display:flex;flex-direction:column;align-items:flex-start;flex-shrink:0;margin-right:24px}
.dx-stat-label{font-family:'Oswald',sans-serif;font-size:9px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:1px}
.dx-stat-value{font-family:'Oswald',sans-serif;font-size:22px;font-weight:700;letter-spacing:-.01em;line-height:1;color:var(--text)}
#toolbar{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border)}
.dispatch-report-btn{background:var(--red-bright);color:#fff;border:none;border-radius:3px;padding:7px 14px;font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:6px}
.dispatch-report-btn:hover{background:#a01e28}
#toolbar-spacer{flex:1}
.yesterday-btn{background:none;border:1px solid var(--border);color:var(--dim);border-radius:3px;padding:6px 12px;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.yesterday-btn:hover{border-color:var(--text);color:var(--text)}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#table-wrap{flex:1;overflow-y:auto}
table.dx-table{width:100%;border-collapse:collapse;font-size:12px}
.dx-table thead th{background:var(--surface2);padding:9px 14px;text-align:left;font-family:'Oswald',sans-serif;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;position:sticky;top:0;z-index:1}
.dx-table thead th:hover{color:var(--text)}
.dx-table tbody tr{border-bottom:1px solid #1a1a1a;transition:background .1s}
.dx-table tbody tr:hover{background:rgba(0,0,0,.03)!important}
.dx-table tbody td{padding:9px 14px;vertical-align:middle}
.dx-table .mono{font-family:'Oswald',sans-serif;font-size:12px;font-weight:500}
.dx-table .muted{color:var(--dim)}
.ord-status{font-family:'Oswald',sans-serif;font-size:10px;font-weight:700;letter-spacing:.1em;padding:2px 7px;border-radius:2px;white-space:nowrap}
.ord-status.enroute{background:rgba(59,130,246,.15);color:#60a5fa}
.ord-status.nextstop{background:rgba(249,115,22,.15);color:#fb923c}
.ord-status.arrived{background:rgba(245,158,11,.15);color:#fbbf24}
.ord-status.delivered,.ord-status.complete{background:rgba(34,197,94,.15);color:#4ade80}
.ord-status.pending{background:rgba(139,26,26,.15);color:#f87171}
.ord-status.skipped{background:rgba(100,116,139,.15);color:#94a3b8}
.ord-status.unscheduled{background:rgba(139,26,26,.25);color:#f87171}
.dx-empty{padding:60px 20px;text-align:center;color:var(--muted);font-family:'Oswald',sans-serif;font-size:14px;letter-spacing:.06em;text-transform:uppercase}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #ddd;border-top-color:var(--red-bright);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
#yday-panel{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center}
#yday-panel.open{display:flex}
#yday-inner{background:var(--surface);border:1px solid var(--border);border-radius:6px;width:min(700px,95vw);max-height:80vh;display:flex;flex-direction:column}
#yday-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border)}
#yday-title{font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
#yday-close{background:none;border:none;color:var(--dim);cursor:pointer;font-size:18px;transition:color .15s}
#yday-close:hover{color:var(--text)}
#yday-body{overflow-y:auto;padding:16px 18px}
.yday-empty{color:var(--muted);text-align:center;padding:30px;font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.06em;text-transform:uppercase}
.yday-route{margin-bottom:16px}
.yday-route-header{font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--text);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.yday-stop{display:flex;gap:10px;padding:4px 0;font-size:12px;color:var(--dim)}
.yday-stop-order{font-family:'Oswald',sans-serif;font-weight:600;color:var(--text);min-width:120px}
.yday-stop-status{font-family:'Oswald',sans-serif;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.yday-stop-status.complete{color:var(--green)}
.yday-stop-status.pending{color:var(--muted)}
.yday-stop-status.skipped{color:var(--amber)}
</style>
</head>
<body>
<div id="hdr">
  <div id="hdr-title">Dispatch</div>
  <div id="hdr-sub">Tracking Interface</div>
  <div id="hdr-spacer"></div>
  <div id="hdr-right">
    <div id="hdr-user">BCC <span>Dispatcher</span></div>
    <div class="hdr-badge">D</div>
    <button class="lock-btn">Lock</button>
  </div>
</div>
<div id="statbar">
  <div class="date-nav">
    <button onclick="shiftDate(-1)">&#8249;</button>
    <div id="date-label">&#8212;</div>
    <button onclick="shiftDate(1)">&#8250;</button>
  </div>
  <div class="stat-divider"></div>
  <div class="dx-stat"><span class="dx-stat-label">Routes</span><span class="dx-stat-value" id="statRoutes">&#8212;</span></div>
  <div class="dx-stat"><span class="dx-stat-label">Stops</span><span class="dx-stat-value" id="statStops">&#8212;</span></div>
  <div class="dx-stat"><span class="dx-stat-label">Delivered</span><span class="dx-stat-value" id="statDelivered">&#8212;</span></div>
  <div class="dx-stat"><span class="dx-stat-label">Early</span><span class="dx-stat-value" id="statEarly" style="color:var(--green)">&#8212;</span></div>
  <div class="dx-stat"><span class="dx-stat-label">On Time</span><span class="dx-stat-value" id="statOnTime">&#8212;</span></div>
  <div class="dx-stat"><span class="dx-stat-label">Late</span><span class="dx-stat-value" id="statLate">&#8212;</span></div>
  <div class="dx-stat"><span class="dx-stat-label">Same Day</span><span class="dx-stat-value" id="statSameDay">&#8212;</span></div>
  <div class="dx-stat"><span class="dx-stat-label">Miles</span><span class="dx-stat-value" id="statMiles">&#8212;</span></div>
</div>
<div id="toolbar">
  <button class="dispatch-report-btn" onclick="window.print()">&#9889; Dispatch Report</button>
  <div id="toolbar-spacer"></div>
  <button class="yesterday-btn" onclick="openYday()">&#8857; Yesterday</button>
</div>
<div id="main">
  <div id="table-wrap">
    <table class="dx-table">
      <thead>
        <tr>
          <th onclick="sortBy('order')">Order # &#8645;</th>
          <th onclick="sortBy('customer')">Customer &#8645;</th>
          <th onclick="sortBy('address')">Address &#8645;</th>
          <th onclick="sortBy('driver')">Driver &#8645;</th>
          <th onclick="sortBy('asset')">Vehicle &#8645;</th>
          <th onclick="sortBy('eta')">ETA &#8645;</th>
          <th onclick="sortBy('status')">Status &#8645;</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="7" class="dx-empty"><span class="spinner"></span>Loading&#8230;</td></tr>
      </tbody>
    </table>
  </div>
</div>
<div id="yday-panel">
  <div id="yday-inner">
    <div id="yday-header">
      <div id="yday-title">Yesterday&#8217;s Routes</div>
      <button id="yday-close" onclick="closeYday()">&#10005;</button>
    </div>
    <div id="yday-body"><div class="yday-empty">Loading&#8230;</div></div>
  </div>
</div>
<script>
'use strict';
const DB='https://bccsms-27c55-default-rtdb.firebaseio.com';
let dateOffset=0,S={routes:{},mileage:{},rows:[]},_sortCol='eta',_sortDir=1;
function localDateKey(d){const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dy=String(d.getDate()).padStart(2,'0');return `${y}-${m}-${dy}`}
function activeKey(){const d=new Date();d.setDate(d.getDate()+dateOffset);return localDateKey(d)}
function fmtDateLabel(k){const d=new Date(k+'T12:00:00');const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];const today=localDateKey(new Date()),tom=localDateKey(new Date(+new Date()+864e5)),yes=localDateKey(new Date(+new Date()-864e5));const tag=k===today?'Today \xb7 ':k===tom?'Tomorrow \xb7 ':k===yes?'Yesterday \xb7 ':'';return `${tag}${days[d.getDay()]}, ${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`}
function fmtTime(iso){if(!iso)return '\u2014';try{const d=new Date(iso),h=d.getHours(),m=d.getMinutes();return `${h%12||12}:${String(m).padStart(2,'0')} ${h<12?'AM':'PM'}`}catch{return '\u2014'}}
function shiftDate(n){dateOffset+=n;updateDateLabel();load()}
function updateDateLabel(){document.getElementById('date-label').textContent=fmtDateLabel(activeKey())}
function statusKey(s){const ds=(s.deliveryStatus||s.status||'').toLowerCase();if(ds.includes('delivered')||ds==='complete')return 'delivered';if(ds.includes('next stop'))return 'nextstop';if(ds.includes('arrived'))return 'arrived';if(ds.includes('enroute')||ds.includes('en route'))return 'enroute';if(ds==='skipped')return 'skipped';return 'pending'}
const ROW_BG={enroute:'rgba(59,130,246,.06)',nextstop:'rgba(249,115,22,.06)',arrived:'rgba(245,158,11,.06)',delivered:'rgba(34,197,94,.05)',complete:'rgba(34,197,94,.05)',pending:'',skipped:'rgba(100,116,139,.05)',unscheduled:'rgba(139,26,26,.06)'};
async function load(){
  const dk=activeKey();
  try{
    const [live,archive,mileage,unassigned]=await Promise.all([
      fetch(`${DB}/routes.json?orderBy="date"&equalTo="${dk}"`).then(r=>r.json()).catch(()=>({})),
      fetch(`${DB}/reports/${dk}.json`).then(r=>r.json()).catch(()=>null),
      fetch(`${DB}/mileage.json`).then(r=>r.json()).catch(()=>null),
      fetch(`${DB}/routes/UNASSIGNED.json`).then(r=>r.json()).catch(()=>null),
    ]);
    const routes=live||{};
    if(archive&&typeof archive==='object')Object.entries(archive).forEach(([rid,r])=>{if(!routes[rid])routes[rid]=r});
    if(unassigned)routes['UNASSIGNED']=unassigned;
    S.routes=routes;S.mileage=mileage||{};
    buildRows(dk);renderStats(dk);renderTable();
  }catch(e){document.getElementById('tableBody').innerHTML=`<tr><td colspan="7" class="dx-empty">Error: ${e.message}</td></tr>`}
}
function buildRows(dk){
  const rows=[];
  Object.entries(S.routes).filter(([id,r])=>r&&r.date===dk&&id!=='UNASSIGNED').forEach(([routeId,route])=>{
    Object.values(route.stops||{}).forEach(stop=>{
      if(!stop||!stop.orderNumber)return;
      const sk=statusKey(stop),eta=stop.calculatedEta||stop.arrivalTime||'';
      rows.push({order:stop.orderNumber,customer:stop.customerName||'\u2014',address:stop.address||'\u2014',driver:route.driverName||'\u2014',asset:route.asset||'\u2014',eta,etaFmt:fmtTime(eta),status:sk,routeId,weight:stop.weight||0,timing:stop.timing||'',dqOrderDate:stop.dqOrderDate||''});
    });
  });
  const ua=S.routes['UNASSIGNED'];
  if(ua&&ua.stops)Object.values(ua.stops).forEach(s=>{if(!s||!s.orderNumber)return;rows.push({order:s.orderNumber,customer:s.customerName||'\u2014',address:s.address||'\u2014',driver:'\u2014',asset:'Unscheduled',eta:'',etaFmt:'\u2014',status:'unscheduled',routeId:null,weight:s.weight||0,timing:'',dqOrderDate:''})});
  S.rows=rows;
}
function renderStats(dk){
  const todayRoutes=Object.entries(S.routes).filter(([id,r])=>r&&r.date===dk&&id!=='UNASSIGNED');
  let stops=0,delivered=0,early=0,onTime=0,late=0,eligible=0,sameDay=0;
  todayRoutes.forEach(([,r])=>{
    Object.values(r.stops||{}).forEach(s=>{
      if(!s||!s.orderNumber)return;stops++;
      const sk=statusKey(s);
      if(sk==='delivered'||sk==='complete')delivered++;
      if(s.timing==='early'){early++;eligible++}
      if(s.timing==='ontime'){onTime++;eligible++}
      if(s.timing==='late'){late++;eligible++}
      const routeDate=(r.date||'').substring(0,10);
      if(s.dqOrderDate&&routeDate){const entered=new Date(s.dqOrderDate),shipDate=new Date(routeDate+'T00:00:00'),cutoff=new Date(shipDate);cutoff.setDate(cutoff.getDate()-1);cutoff.setHours(16,0,0,0);if(entered>=cutoff)sameDay++}
    });
  });
  const earlyPct=eligible>0?Math.round(early/eligible*100):null;
  const onTimePct=eligible>0?Math.round(onTime/eligible*100):null;
  const latePct=eligible>0?Math.round(late/eligible*100):null;
  const miles=S.mileage?.date===dk?(S.mileage.total||0):0;
  document.getElementById('statRoutes').textContent=todayRoutes.length||'0';
  document.getElementById('statStops').textContent=stops||'0';
  document.getElementById('statDelivered').textContent=delivered||'0';
  document.getElementById('statEarly').textContent=earlyPct!==null?earlyPct+'%':'\u2014';
  document.getElementById('statOnTime').textContent=onTimePct!==null?onTimePct+'%':'\u2014';
  const lateEl=document.getElementById('statLate');lateEl.textContent=latePct!==null?latePct+'%':'\u2014';lateEl.style.color=latePct>20?'#f87171':'';
  document.getElementById('statSameDay').textContent=sameDay??'\u2014';
  document.getElementById('statMiles').textContent=miles>0?miles.toLocaleString():'\u2014';
}
function sortBy(col){if(_sortCol===col)_sortDir*=-1;else{_sortCol=col;_sortDir=1}renderTable()}
function renderTable(){
  const rows=[...S.rows].sort((a,b)=>{let va=_sortCol==='eta'?(a.eta||'Z'):(a[_sortCol]||''),vb=_sortCol==='eta'?(b.eta||'Z'):(b[_sortCol]||'');return va<vb?-_sortDir:va>vb?_sortDir:0});
  const tbody=document.getElementById('tableBody');
  if(!rows.length){tbody.innerHTML='<tr><td colspan="7" class="dx-empty">No orders found for this date</td></tr>';return}
  tbody.innerHTML=rows.map(r=>`<tr style="background:${ROW_BG[r.status]||''}"><td class="mono">${r.order}</td><td style="font-weight:500">${r.customer}</td><td class="muted">${r.address}</td><td>${r.driver}</td><td style="font-family:'Oswald',sans-serif;font-weight:700${r.status==='unscheduled'?';color:#f87171':''}">${r.asset}</td><td style="font-family:'Oswald',sans-serif">${r.etaFmt}</td><td><span class="ord-status ${r.status}">${r.status.toUpperCase()}</span></td></tr>`).join('');
}
async function openYday(){
  document.getElementById('yday-panel').classList.add('open');
  const body=document.getElementById('yday-body');
  body.innerHTML='<div class="yday-empty"><span class="spinner"></span>Loading\u2026</div>';
  const ydayKey=localDateKey(new Date(+new Date(activeKey()+'T12:00:00')-864e5));
  try{
    const [live,archive]=await Promise.all([
      fetch(`${DB}/routes.json?orderBy="date"&equalTo="${ydayKey}"`).then(r=>r.json()).catch(()=>({})),
      fetch(`${DB}/reports/${ydayKey}.json`).then(r=>r.json()).catch(()=>null),
    ]);
    const data=live||{};
    if(archive&&typeof archive==='object')Object.entries(archive).forEach(([rid,r])=>{if(!data[rid])data[rid]=r});
    const ydayRoutes=Object.values(data).filter(r=>r&&r.date===ydayKey&&r.asset);
    if(!ydayRoutes.length){body.innerHTML='<div class="yday-empty">No routes found for yesterday</div>';return}
    body.innerHTML=ydayRoutes.sort((a,b)=>(a.asset||'').localeCompare(b.asset||'')).map(route=>{
      const stops=Object.values(route.stops||{}).sort((a,b)=>(a.sequence||0)-(b.sequence||0));
      const done=stops.filter(s=>s.status==='complete'||s.status==='skipped').length;
      return `<div class="yday-route"><div class="yday-route-header">${route.asset||'?'} ${route.assetDescription||''} \u2014 ${route.driverName||'\u2014'} \xb7 ${done}/${stops.length} done</div>${stops.map(s=>`<div class="yday-stop"><span class="yday-stop-order">${s.orderNumber||'\u2014'}</span><span>${s.customerName||'\u2014'}</span><span class="yday-stop-status ${s.status||'pending'}">${(s.status||'pending').toUpperCase()}</span></div>`).join('')}</div>`;
    }).join('');
  }catch(e){body.innerHTML=`<div class="yday-empty">Error: ${e.message}</div>`}
}
function closeYday(){document.getElementById('yday-panel').classList.remove('open')}
updateDateLabel();load();setInterval(load,120000);
</script>
</body>
</html>
