<!DOCTYPE html>
<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════════════
   BCC Dispatcher — production styles

/* ── TOAST ── */

/* ── LOGIN SCREEN ── */

<body>
<div id="root"></div>
<script>

"use strict";

// ── Config ──────────────────────────────────────────────────────────────────
const DB           = 'https://bccsms-27c55-default-rtdb.firebaseio.com';
const DISPATCH_PIN = '2025';
const TRACKER_BASE = 'https://bcc-sms.netlify.app';

// ── State ───────────────────────────────────────────────────────────────────
const S = {
  authed:      false,
  routes:      {},
  queue:       {},
  dateOffset:  0,
  selected:    null,   // { routeId, stopId }
  drawerDirty: false,
};
let pollTimer = null;
let toastTimer = null;

// ── DB helpers (plain fetch — zero eval) ─────────────────────────────────────
async function dbGet(path) {
  const r = await fetch(`${DB}/${path}.json`);
  if (!r.ok) throw new Error(`DB ${r.status}`);
  return r.json();
}
async function dbPatch(path, data) {
  const r = await fetch(`${DB}/${path}.json`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data),
  });
  if (!r.ok) throw new Error(`DB ${r.status}`);
  return r.json();
}
async function dbPush(path, data) {
  const r = await fetch(`${DB}/${path}.json`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data),
  });
  if (!r.ok) throw new Error(`DB ${r.status}`);
  return r.json();
}

// ── Poll ─────────────────────────────────────────────────────────────────────
async function poll() {
  try {
    const [routes, queue] = await Promise.all([dbGet('routes'), dbGet('resend_queue')]);
    S.routes = routes || {};
    S.queue  = queue  || {};
    renderRoutes();
    renderStats();
    renderDrawerIfOpen();
  } catch (e) { toast(e.message, true); }
}
function startPolling() {
  poll();
  pollTimer = setInterval(poll, 120000);
}
function stopPolling() {
  clearInterval(pollTimer);
  pollTimer = null;
}

// ── Helpers ──────────────────────────────────────────────────────────────────
const ymd   = d => d.toISOString().slice(0, 10);
const fmtDate = d => d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' });
const fmtTime = ts => new Date(ts).toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
const esc   = s => (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function targetDate() {
  const d = new Date();
  d.setDate(d.getDate() + S.dateOffset);
  return d;
}
function dateKey() { return ymd(targetDate()); }
function isToday()  { return S.dateOffset === 0; }

function getRoutes() {
  const dk = dateKey();
  return Object.entries(S.routes)
    .filter(([, r]) => r && r.date === dk)
    .map(([id, r]) => ({
      id, ...r,
      stops: r.stops
        ? Object.entries(r.stops).map(([stopId, s]) => ({ stopId, ...s })).sort((a,b) => (a.sequence||0)-(b.sequence||0))
        : [],
    }))
    .sort((a,b) => a.id.localeCompare(b.id));
}
function queuedStopIds() {
  const ids = new Set();
  Object.values(S.queue).forEach(e => e && e.stopId && ids.add(e.stopId));
  return ids;
}
function getStats() {
  const routes = getRoutes();
  let stops=0, delivered=0, smsSent=0;
  routes.forEach(r => r.stops.forEach(s => {
    stops++;
    if (s.status === 'complete') delivered++;
    if (s.smsSent && (s.smsSent.at || s.smsSent.departed === true || s.smsSent['0'] || s.smsSent['1'])) smsSent++;
  }));
  return { routes: routes.length, stops, delivered, smsSent };
}

// ── Toast ────────────────────────────────────────────────────────────────────
function toast(msg, error = false) {
  const el = document.getElementById('dx-toast');
  if (!el) return;
  el.textContent = msg;
  el.className = 'dx-toast' + (error ? ' error' : '');
  el.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.display = 'none'; }, 2200);
}

// ── PIN screen ───────────────────────────────────────────────────────────────
function renderPin() {
  document.getElementById('root').innerHTML = `
    <div class="dx-login-shell">
      <div class="dx-login">
        <div class="dx-login-brand">
          <span class="dx-login-product">BCC Dispatch</span>
          <span class="dx-login-sub">Dispatcher access only</span>
        </div>
        <div class="dx-login-form">
          <div class="dx-login-form-head">Enter PIN</div>
          <div class="dx-login-fields">
            <div class="dx-login-field">
              <label for="dx-pin">PIN</label>
              <input id="dx-pin" class="dx-input" type="password"
                inputmode="numeric" placeholder="••••" autocomplete="off">
            </div>
          </div>
          <div id="dx-pin-err" class="dx-login-error" style="display:none"></div>
          <div class="dx-login-actions">
            <button id="dx-pin-btn" class="dx-action-btn primary full">Enter</button>
          </div>
        </div>
      </div>
    </div>`;

  const input = document.getElementById('dx-pin');
  const errEl = document.getElementById('dx-pin-err');
  input.focus();

  function checkPin() {
    if (input.value === DISPATCH_PIN) {
      S.authed = true;
      renderApp();
      startPolling();
    } else {
      errEl.textContent = 'Incorrect PIN';
      errEl.style.display = 'block';
      input.value = '';
      input.focus();
    }
  }
  document.getElementById('dx-pin-btn').onclick = checkPin;
  input.onkeydown = e => { if (e.key === 'Enter') checkPin(); };
}

// ── Main app shell ───────────────────────────────────────────────────────────
function renderApp() {
  document.getElementById('root').innerHTML = `
    <header class="dx-header">
      <div class="dx-brand">
        <img src="./logo.jpg" alt="BCC" style="height:48px;width:auto;filter:brightness(0) invert(1);">
        <div class="dx-divider"></div>
        <div class="dx-product">
          <span class="dx-product-name">Dispatch</span>
          <span class="dx-product-sub">Tracking interface</span>
        </div>
      </div>
      <div class="dx-user">
        <span>BCC <b>Dispatcher</b></span>
        <span class="dx-avatar">D</span>
        <button class="dx-signout-btn" id="dx-lock-btn">Lock</button>
      </div>
    </header>

    <div class="dx-subbar">
      <div class="dx-datenav">
        <button id="dx-prev" title="Previous day">&#8249;</button>
        <div class="dx-date">
          <span class="dx-date-label">Showing</span>
          <span class="dx-date-value" id="dx-date-value"></span>
        </div>
        <button id="dx-next" title="Next day">&#8250;</button>
        <button class="dx-today-btn" id="dx-today" style="display:none">Today</button>
      </div>
      <div class="dx-stats" id="dx-stats"></div>
    </div>

    <main class="dx-main" id="dx-routes"></main>

    <div id="dx-drawer-wrap" style="display:none"></div>
    <div id="dx-toast" class="dx-toast" style="display:none"></div>`;

  document.getElementById('dx-lock-btn').onclick = () => {
    stopPolling();
    S.authed = false;
    S.selected = null;
    renderPin();
  };
  document.getElementById('dx-prev').onclick = () => { S.dateOffset--; refreshDate(); };
  document.getElementById('dx-next').onclick = () => { S.dateOffset++; refreshDate(); };
  document.getElementById('dx-today').onclick = () => { S.dateOffset = 0; refreshDate(); };

  document.addEventListener('keydown', onEsc);
  refreshDate();
  renderStats();
  renderRoutes();
}

function onEsc(e) {
  if (e.key === 'Escape' && S.selected) {
    S.selected = null;
    document.getElementById('dx-drawer-wrap').style.display = 'none';
    document.getElementById('dx-drawer-wrap').innerHTML = '';
  }
}

function refreshDate() {
  const el = document.getElementById('dx-date-value');
  if (el) el.textContent = fmtDate(targetDate());
  const todayBtn = document.getElementById('dx-today');
  if (todayBtn) todayBtn.style.display = isToday() ? 'none' : '';
  renderRoutes();
  renderStats();
}

// ── Stats bar ────────────────────────────────────────────────────────────────
function renderStats() {
  const el = document.getElementById('dx-stats');
  if (!el) return;
  const s = getStats();
  el.innerHTML = `
    <div class="dx-stat"><span class="dx-stat-label">Routes</span><span class="dx-stat-value">${s.routes}</span></div>
    <div class="dx-stat"><span class="dx-stat-label">Stops</span><span class="dx-stat-value">${s.stops}</span></div>
    <div class="dx-stat"><span class="dx-stat-label">Delivered</span><span class="dx-stat-value">${s.delivered}</span></div>
    <div class="dx-stat"><span class="dx-stat-label">SMS Sent</span><span class="dx-stat-value red">${s.smsSent}</span></div>`;
}

// ── Route blocks ─────────────────────────────────────────────────────────────
function renderRoutes() {
  const el = document.getElementById('dx-routes');
  if (!el) return;
  const routes = getRoutes();
  const queued = queuedStopIds();
  const sel = S.selected;

  if (routes.length === 0) {
    el.innerHTML = `
      <div class="dx-empty">
        <div class="dx-empty-code">&#8709;</div>
        <div class="dx-empty-msg">No routes for ${esc(fmtDate(targetDate()))}.<br>
          ${isToday() ? 'The poller will seed routes when DQ has them.' : 'Pick another day with the arrows above.'}
        </div>
      </div>`;
    return;
  }

  el.innerHTML = routes.map(r => routeBlockHTML(r, queued, sel)).join('') +
    '<div class="dx-meta-foot">Live &mdash; Firebase REST &middot; polls every 5s</div>';

  // Attach click handlers to all Edit buttons and rows
  el.querySelectorAll('[data-stop]').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const { route, stop } = btn.dataset;
      S.selected = { routeId: route, stopId: stop };
      renderDrawer();
    };
  });
}

function routeBlockHTML(r, queued, sel) {
  const completed = r.stops.filter(s => s.status === 'complete').length;
  const total = r.stops.length;
  const pct = total ? Math.round(completed/total*100) : 0;
  return `
    <section class="dx-route">
      <div class="dx-route-head">
        <div class="dx-route-head-left">
          <span class="dx-route-id">Route <b>${esc(r.id)}</b></span>
          <span class="dx-route-meta">
            ${r.driverName ? `Driver <b>${esc(r.driverName)}</b> &middot; ` : ''}Unit <b>${esc(r.asset||'—')}</b>
            ${r.startedAt ? ` &middot; Started <b>${esc(r.startedAt)}</b>` : ''}
          </span>
        </div>
        <div class="dx-route-head-right">
          <div class="dx-route-progress">
            <div class="dx-route-progress-meta">
              <span>Progress</span><span>${completed} of ${total} stops done</span>
            </div>
            <div class="dx-route-bar"><div class="dx-route-fill" style="width:${pct}%"></div></div>
          </div>
        </div>
      </div>
      <table class="dx-table">
        <thead><tr>
          <th>#</th><th>Order</th><th>Customer</th>
          <th>Customer ETA</th><th>Status</th><th>SMS</th><th></th>
        </tr></thead>
        <tbody>
          ${r.stops.map(s => stopRowHTML(r.id, s, queued.has(s.stopId), sel && sel.routeId===r.id && sel.stopId===s.stopId)).join('')}
        </tbody>
      </table>
    </section>`;
}

function stopRowHTML(routeId, s, isQueued, isSelected) {
  const cls = ['dx-row', s.status||'', isSelected?'selected':'', s.status==='skipped'?'skipped':''].join(' ');
  return `
    <tr class="${esc(cls)}" data-stop="${esc(s.stopId)}" data-route="${esc(routeId)}">
      <td class="dx-seq">${s.sequence||''}</td>
      <td class="dx-order">${esc(s.orderNumber||'')}</td>
      <td>
        <div class="dx-customer">${esc(s.customerName||'')}</div>
        <div class="dx-customer-sub">${esc(s.address||'')}</div>
      </td>
      <td>${etaCellHTML(s.customerEta, s.etaOverridden, s.arrivalTime)}</td>
      <td>${statusBadgeHTML(s.status, s.completedAt)}</td>
      <td>${smsCellHTML(s.smsSent, isQueued)}</td>
      <td><button class="dx-more-btn" data-stop="${esc(s.stopId)}" data-route="${esc(routeId)}">Edit ›</button></td>
    </tr>`;
}

function etaCellHTML(eta, overridden, arrivalTime) {
  // Prefer manual customerEta override
  if (eta && eta.low && eta.low !== '—') {
    return `<div class="dx-eta">
      <span class="dx-eta-window">
        <span>${esc(eta.low)}</span>
        <span class="dx-eta-dash">&ndash;</span>
        <span>${esc(eta.high||'')}</span>
      </span>
      ${overridden ? '<span class="dx-eta-tag">Manual</span>' : ''}
    </div>`;
  }
  // Fall back to arrivalTime from poller
  if (arrivalTime) {
    const d = new Date(arrivalTime);
    if (!isNaN(d)) {
      const low  = d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
      const high = new Date(d.getTime() + 30*60000).toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
      return `<div class="dx-eta">
        <span class="dx-eta-window">
          <span>${low}</span>
          <span class="dx-eta-dash">&ndash;</span>
          <span>${high}</span>
        </span>
      </div>`;
    }
  }
  return '<span class="dx-eta-empty">&mdash;</span>';
}

function statusBadgeHTML(status, completedAt) {
  const ts = completedAt ? fmtTime(completedAt) : '—';
  if (status === 'complete') return `<span class="dx-badge complete">Done &middot; ${esc(ts)}</span>`;
  if (status === 'next')     return `<span class="dx-badge next">Next</span>`;
  if (status === 'skipped')  return `<span class="dx-badge skipped">Skipped</span>`;
  return `<span class="dx-badge pending">Pending</span>`;
}

function smsCellHTML(sms, queued) {
  if (queued) return `<span class="dx-sms-cell queued"><span class="dx-sms-dot"></span>Queued</span>`;
  if (sms && sms.at) {
    const at = typeof sms.at === 'number' ? fmtTime(sms.at) : sms.at;
    return `<span class="dx-sms-cell sent"><span class="dx-sms-dot"></span>${esc(at)}</span>`;
  }
  if (sms && (sms.departed === true || sms['0'] || sms['1'] || sms['3'])) {
    return `<span class="dx-sms-cell sent"><span class="dx-sms-dot"></span>Sent</span>`;
  }
  return `<span class="dx-sms-cell unsent">Not sent</span>`;
}

// ── Stop Drawer ───────────────────────────────────────────────────────────────
function getSelectedStop() {
  if (!S.selected) return { route: null, stop: null };
  const route = getRoutes().find(r => r.id === S.selected.routeId);
  const stop  = route ? route.stops.find(s => s.stopId === S.selected.stopId) : null;
  return { route, stop };
}

function renderDrawer() {
  const wrap = document.getElementById('dx-drawer-wrap');
  if (!wrap) return;
  const { route, stop } = getSelectedStop();
  if (!stop) { wrap.style.display = 'none'; wrap.innerHTML = ''; return; }

  const queued = queuedStopIds().has(stop.stopId);
  const url    = `${TRACKER_BASE}/?token=${esc(stop.token||'')}`;
  const eta    = stop.customerEta || { low: '', high: '' };

  wrap.style.display = 'block';
  wrap.innerHTML = `
    <div class="dx-drawer-scrim" id="dx-scrim"></div>
    <aside class="dx-drawer" role="dialog">
      <div class="dx-drawer-head">
        <div class="dx-seq-big">${stop.sequence||''}</div>
        <div class="dx-drawer-titles">
          <div class="dx-drawer-title">${esc(stop.customerName||'')}</div>
          <div class="dx-drawer-order">${esc(stop.orderNumber||'')} &middot; Route ${esc(route.id)} &middot; Unit ${esc(route.asset||'—')}</div>
        </div>
        <button class="dx-drawer-close" id="dx-drawer-close">&times;</button>
      </div>
      <div class="dx-drawer-intro">Edit what the customer sees on their tracker</div>
      <div class="dx-drawer-body">

        <!-- ETA -->
        <div class="dx-edit-block">
          <div class="dx-edit-label">Customer ETA Window</div>
          <div class="dx-eta-edit">
            <input class="dx-input" id="dx-eta-low" value="${esc(eta.low||'')}" placeholder="1:30 PM">
            <span class="dx-eta-edit-dash">to</span>
            <input class="dx-input" id="dx-eta-high" value="${esc(eta.high||'')}" placeholder="2:15 PM">
          </div>
          <div class="dx-edit-help">
            Shown on the customer tracking page.
            ${stop.etaOverridden ? 'Currently overriding the auto-computed window.' : 'Type to override the auto-computed window.'}
          </div>
          <button class="dx-action-btn primary full" id="dx-save-eta">Save ETA</button>
        </div>

        <!-- Status -->
        <div class="dx-edit-block">
          <div class="dx-edit-label">Stop Status</div>
          <div class="dx-status-picker">
            ${['pending','next','complete','skipped'].map(s =>
              `<button class="dx-status-btn${stop.status===s?' active':''}" data-status="${s}">${s}</button>`
            ).join('')}
          </div>
          <div class="dx-edit-help">Drives the headline on the customer tracker.</div>
        </div>

        <!-- SMS -->
        <div class="dx-edit-block">
          <div class="dx-edit-label">Tracking SMS</div>
          <div class="dx-phone-edit">
            <input type="tel" class="dx-input dx-input-phone" id="dx-phone"
              value="${esc(stop.phone||'')}" placeholder="+19895551234">
            <button class="dx-action-btn" id="dx-save-phone">Save Phone</button>
          </div>
          <div style="margin-top:6px">
            ${queued
              ? '<span class="dx-sms-cell queued"><span class="dx-sms-dot"></span>Queued &mdash; sends on next poll</span>'
              : stop.smsSent && stop.smsSent.at
                ? `<span class="dx-sms-cell sent"><span class="dx-sms-dot"></span>Sent at ${typeof stop.smsSent.at==='number' ? esc(fmtTime(stop.smsSent.at)) : esc(stop.smsSent.at)}</span>`
                : stop.smsSent && stop.smsSent.departed === true
                  ? '<span class="dx-sms-cell sent"><span class="dx-sms-dot"></span>Sent</span>'
                  : '<span class="dx-sms-cell unsent">Not yet sent &mdash; will fire on next poll</span>'
            }
          </div>
          <button class="dx-action-btn" id="dx-resend-btn" ${queued ? 'disabled' : ''}>
            ${queued ? 'Queued ✓' : (stop.smsSent && (stop.smsSent.at || stop.smsSent.departed === true)) ? 'Resend Tracking Link' : 'Send Now'}
          </button>
          <div class="dx-edit-help">SMS sends once when the route departs. Up to 2-minute delay.</div>
        </div>

        <!-- Read-only fields -->
        <div class="dx-readonly-block">
          <div class="dx-field">
            <span class="dx-field-label">Delivery Address</span>
            <span class="dx-field-value">${esc(stop.address||'—')}</span>
          </div>
          <div class="dx-field">
            <span class="dx-field-label">Tracking URL</span>
            <span class="dx-field-value mono"><a href="${url}" target="_blank">${url}</a></span>
          </div>
          ${stop.items && stop.items.length ? `
          <div class="dx-field">
            <span class="dx-field-label">Items</span>
            <div class="dx-items-list">
              ${stop.items.map(it => `<div class="dx-item"><span class="dx-item-qty">${esc(String(it.qty||''))}</span><span>${esc(it.description||'')}</span></div>`).join('')}
            </div>
          </div>` : ''}
        </div>
      </div>
    </aside>`;

  // Events
  document.getElementById('dx-scrim').onclick       = closeDrawer;
  document.getElementById('dx-drawer-close').onclick = closeDrawer;

  document.getElementById('dx-save-eta').onclick = async () => {
    const low  = document.getElementById('dx-eta-low').value.trim() || '—';
    const high = document.getElementById('dx-eta-high').value.trim() || '—';
    const oldEta = stop.customerEta ? `${stop.customerEta.low||'—'} – ${stop.customerEta.high||'—'}` : '—';
    try {
      await dbPatch(`routes/${S.selected.routeId}/stops/${S.selected.stopId}`,
        { customerEta: { low, high }, etaOverridden: true });
      await logHistory({
        field: 'customerEta',
        oldValue: oldEta,
        newValue: `${low} – ${high}`,
        route, stop,
      });
      toast('CUSTOMER ETA UPDATED');
    } catch(e) { toast(e.message, true); }
  };

  wrap.querySelectorAll('.dx-status-btn').forEach(btn => {
    btn.onclick = async () => {
      const next  = btn.dataset.status;
      const patch = { status: next };
      if (next === 'complete') patch.completedAt = new Date().toISOString();
      else patch.completedAt = null;
      try {
        await dbPatch(`routes/${S.selected.routeId}/stops/${S.selected.stopId}`, patch);
        await logHistory({
          field: 'status',
          oldValue: stop.status || 'pending',
          newValue: next,
          route, stop,
        });
        const labels = { pending:'PENDING', next:'MARKED NEXT', complete:'MARKED COMPLETE', skipped:'MARKED SKIPPED' };
        toast(labels[next] || 'STATUS UPDATED');
      } catch(e) { toast(e.message, true); }
    };
  });

  document.getElementById('dx-save-phone').onclick = async () => {
    const phone = document.getElementById('dx-phone').value.trim();
    try {
      await dbPatch(`routes/${S.selected.routeId}/stops/${S.selected.stopId}`, { phone });
      await logHistory({
        field: 'phone',
        oldValue: stop.phone || '—',
        newValue: phone,
        route, stop,
      });
      toast('PHONE NUMBER UPDATED');
    } catch(e) { toast(e.message, true); }
  };

  document.getElementById('dx-resend-btn').onclick = async () => {
    try {
      await dbPush('resend_queue', {
        routeId:     S.selected.routeId,
        stopId:      S.selected.stopId,
        requestedAt: Date.now(),
        requestedBy: 'dispatcher',
      });
      await logHistory({
        field: 'smsSent',
        oldValue: '—',
        newValue: 'resend queued',
        route, stop,
      });
      toast('SMS QUEUED — SENDS ON NEXT POLL');
    } catch(e) { toast(e.message, true); }
  };
}

// ── History logging ───────────────────────────────────────────────────────────
async function logHistory({ field, oldValue, newValue, route, stop }) {
  const dk = dateKey();
  try {
    await dbPush(`history/${dk}`, {
      changedAt:    Date.now(),
      changedBy:    'dispatcher',
      routeId:      route.id,
      asset:        route.asset || '—',
      driverName:   route.driverName || '—',
      stopId:       stop.stopId,
      orderNumber:  stop.orderNumber || '—',
      customerName: stop.customerName || '—',
      address:      stop.address || '—',
      field,
      oldValue:     String(oldValue),
      newValue:     String(newValue),
    });
  } catch(e) {
    console.warn('History log failed:', e.message);
  }
}

function renderDrawerIfOpen() {
  if (S.selected && document.getElementById('dx-drawer-wrap') &&
      document.getElementById('dx-drawer-wrap').style.display !== 'none') {
    renderDrawer();
  }
}

function closeDrawer() {
  S.selected = null;
  const wrap = document.getElementById('dx-drawer-wrap');
  if (wrap) { wrap.style.display = 'none'; wrap.innerHTML = ''; }
}

// ── Boot ─────────────────────────────────────────────────────────────────────
renderPin();

</script>
</body>
</html>
