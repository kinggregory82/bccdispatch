<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BCC — Owner Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0c0e14;color:#e8eaf2;font-family:'IBM Plex Sans',system-ui,sans-serif;font-size:14px;line-height:1.5;min-height:100vh}

.header{background:#13151f;border-bottom:1px solid #1e2235;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{font-size:17px;font-weight:600;letter-spacing:-.3px;color:#fff}
.brand span{color:#f59e0b}
.date-badge{background:#1e2235;color:#9096b4;font-size:12px;padding:4px 10px;border-radius:4px;font-family:'IBM Plex Mono',monospace;margin-left:16px}
.sync-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#10b981;margin-right:5px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
.sync-info{font-size:11px;color:#5a6080;font-family:'IBM Plex Mono',monospace}
.refresh-btn{background:#1e2235;border:1px solid #2a2d3a;color:#9096b4;font-size:12px;padding:5px 12px;border-radius:4px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif}
.refresh-btn:hover{background:#252840;color:#e8eaf2}

.main{padding:24px;max-width:1400px;margin:0 auto}

.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:20px}
.kpi-card{background:#13151f;border:1px solid #1e2235;border-radius:8px;padding:16px 18px}
.kpi-card.top-amber{border-top:2px solid #f59e0b}
.kpi-card.top-green{border-top:2px solid #10b981}
.kpi-card.top-red{border-top:2px solid #ef4444}
.kpi-card.top-blue{border-top:2px solid #3b82f6}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:.9px;color:#5a6080;margin-bottom:8px;font-weight:500}
.kpi-value{font-size:30px;font-weight:600;font-family:'IBM Plex Mono',monospace;line-height:1;color:#fff}
.kpi-sub{font-size:11px;color:#5a6080;margin-top:5px}

.row{display:grid;gap:16px;margin-bottom:16px}
.row-3{grid-template-columns:1fr 1fr 300px}
.row-2{grid-template-columns:1fr 1fr}

.panel{background:#13151f;border:1px solid #1e2235;border-radius:8px;overflow:hidden}
.panel-header{padding:11px 16px;border-bottom:1px solid #1e2235;display:flex;align-items:center;justify-content:space-between}
.panel-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.9px;color:#9096b4}
.panel-note{font-size:11px;color:#5a6080}
.panel-body{padding:0 16px}

.dt{width:100%;border-collapse:collapse}
.dt th{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#5a6080;padding:0 8px 9px;text-align:right;font-weight:500;white-space:nowrap}
.dt th:first-child{text-align:left}
.dt td{padding:7px 8px;font-size:13px;border-top:1px solid #191c2b;vertical-align:middle}
.dt td:not(:first-child){text-align:right;font-family:'IBM Plex Mono',monospace;font-size:12px}
.dt-name{font-weight:500;color:#e8eaf2}
.dt-sub{font-size:11px;color:#5a6080}

.bar-wrap{display:flex;align-items:center;gap:6px;justify-content:flex-end}
.bar-track{width:44px;height:4px;background:#1e2235;border-radius:2px;overflow:hidden;flex-shrink:0}
.bar-fill{height:100%;border-radius:2px}

.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:3px;font-weight:500}
.badge-done{background:#0d2b22;color:#34d399}
.badge-active{background:#2b2211;color:#fbbf24}
.badge-pending{background:#2b2211;color:#fbbf24}
.badge-nophoto{background:#2b1111;color:#f87171}

.issue-item{padding:9px 0;border-bottom:1px solid #191c2b}
.issue-item:last-child{border-bottom:none}
.issue-order{font-size:11px;font-family:'IBM Plex Mono',monospace;color:#f59e0b}
.issue-customer{font-size:13px;color:#e8eaf2;font-weight:500;margin:2px 0}
.issue-detail{font-size:11px;color:#5a6080}

.chart-wrap{position:relative;height:190px;margin-bottom:12px}

.loading{text-align:center;padding:60px;color:#5a6080}
.spinner{width:30px;height:30px;border:2px solid #1e2235;border-top-color:#f59e0b;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{color:#ef4444;font-size:13px;padding:8px 0}

.footer{text-align:center;padding:20px;color:#1e2235;font-size:11px;font-family:'IBM Plex Mono',monospace}

@media(max-width:1100px){.kpi-grid{grid-template-columns:repeat(3,1fr)}.row-3{grid-template-columns:1fr 1fr}.row-2{grid-template-columns:1fr}}
@media(max-width:700px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.row-3,.row-2{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center">
    <div class="brand">BCC <span>OPERATIONS</span></div>
    <div class="date-badge" id="dateBadge">—</div>
  </div>
  <div style="display:flex;align-items:center;gap:14px">
    <div class="sync-info"><span class="sync-dot"></span><span id="syncTime">Loading...</span></div>
    <button class="refresh-btn" onclick="init()">Refresh</button>
  </div>
</div>

<div class="main" id="mainContent">
  <div class="loading"><div class="spinner"></div>Loading operations data...</div>
</div>

<div class="footer">BCC Dispatch System &nbsp;·&nbsp; Auto-refreshes every 2 minutes</div>

<script>
const FIREBASE = 'https://bccsms-27c55-default-rtdb.firebaseio.com';
let trendChart = null;

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function nDaysAgo(n) {
  const d = new Date();
  d.setDate(d.getDate() - n);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function friendlyDate(ds) {
  const d = new Date(ds + 'T12:00:00');
  return d.toLocaleDateString('en-US', {weekday:'long',month:'long',day:'numeric',year:'numeric'});
}

function shortDate(ds) {
  const d = new Date(ds + 'T12:00:00');
  return d.toLocaleDateString('en-US', {weekday:'short',month:'numeric',day:'numeric'});
}

function pctColor(val, good, warn) {
  if (val === null || val === undefined) return '#5a6080';
  if (val >= good) return '#10b981';
  if (val >= warn) return '#f59e0b';
  return '#ef4444';
}

async function fetchJSON(path) {
  const r = await fetch(FIREBASE + path + '.json');
  if (!r.ok) throw new Error('HTTP ' + r.status + ' on ' + path);
  return r.json();
}

function getStops(route) {
  const raw = route.stops || {};
  return Object.entries(raw).map(([k, s]) => ({
    ...s,
    _key: k,
    _driver: route.driverName || '',
    _asset: route.assetDescription || route.asset || '',
    _date: route.date || '',
    _routeId: route._routeId || '',
  }));
}

function isComplete(s) { return s.status === 'complete' || s.deliveryStatus === 'Delivered'; }
function isOnTime(s) { return s.timing === 'ontime' || s.timing === 'early'; }
function hasPhoto(s) {
  if (!s.pictures) return false;
  if (Array.isArray(s.pictures)) return s.pictures.length > 0;
  return Object.keys(s.pictures).length > 0;
}
function hasSms(s) {
  if (!s.smsSent) return false;
  return !!(s.smsSent.departed || s.smsSent.advance);
}

function buildMetrics(stops) {
  const comp = stops.filter(isComplete);
  const pend = stops.filter(s => !isComplete(s));
  const ot   = comp.filter(isOnTime);
  const ph   = comp.filter(hasPhoto);
  const sms  = stops.filter(hasSms);
  return {
    total: stops.length,
    complete: comp.length,
    pending: pend.length,
    ontime: ot.length,
    photos: ph.length,
    sms: sms.length,
    ontimePct: comp.length ? Math.round(ot.length / comp.length * 100) : null,
    photoPct:  comp.length ? Math.round(ph.length  / comp.length * 100) : null,
    completePct: stops.length ? Math.round(comp.length / stops.length * 100) : null,
    compStops: comp,
    pendStops: pend,
    noPhotoComp: comp.filter(s => !hasPhoto(s)),
  };
}

function buildPage(routes, historical) {
  const today = todayStr();

  // --- TODAY'S STOPS ---
  const todayRoutes = Object.entries(routes || {})
    .filter(([,r]) => r.date === today)
    .map(([id, r]) => { r._routeId = id; return r; });

  let allStops = [];
  todayRoutes.forEach(r => { allStops = allStops.concat(getStops(r)); });
  const M = buildMetrics(allStops);

  // --- BY DRIVER ---
  const driverMap = {};
  allStops.forEach(s => {
    const key = s._driver || '(unassigned)';
    if (!driverMap[key]) driverMap[key] = { name: key, asset: s._asset, t:0, c:0, ot:0, ph:0 };
    driverMap[key].t++;
    if (isComplete(s)) {
      driverMap[key].c++;
      if (isOnTime(s)) driverMap[key].ot++;
      if (hasPhoto(s))  driverMap[key].ph++;
    }
  });
  const drivers = Object.values(driverMap).sort((a,b) => b.t - a.t);

  // --- BY SALES ---
  const salesMap = {};
  allStops.forEach(s => {
    const rep = s.assignedSales || '—';
    if (!salesMap[rep]) salesMap[rep] = { rep, t:0, c:0 };
    salesMap[rep].t++;
    if (isComplete(s)) salesMap[rep].c++;
  });
  const salesList = Object.values(salesMap).sort((a,b) => b.t - a.t);

  // --- 7-DAY TREND ---
  const trend = [];
  for (let i = 6; i >= 0; i--) {
    const ds = nDaysAgo(i);
    let dayStops = [];
    if (ds === today) {
      dayStops = allStops;
    } else {
      Object.entries(historical || {}).forEach(([id, r]) => {
        if (r.date === ds) { r._routeId = id; dayStops = dayStops.concat(getStops(r)); }
      });
    }
    const dm = buildMetrics(dayStops);
    trend.push({ label: shortDate(ds), date: ds, ...dm });
  }

  // --- BUILD HTML ---
  document.getElementById('mainContent').innerHTML = `

    <!-- KPI ROW -->
    <div class="kpi-grid">
      <div class="kpi-card top-amber">
        <div class="kpi-label">Routes Running</div>
        <div class="kpi-value">${todayRoutes.length}</div>
        <div class="kpi-sub">${M.total} total stops</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Delivered</div>
        <div class="kpi-value" style="color:${pctColor(M.completePct,80,60)}">${M.complete}</div>
        <div class="kpi-sub">${M.completePct !== null ? M.completePct+'% of stops' : '—'}</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Still Pending</div>
        <div class="kpi-value" style="color:${M.pending===0?'#10b981':M.pending<=4?'#f59e0b':'#ef4444'}">${M.pending}</div>
        <div class="kpi-sub">on route or unscheduled</div>
      </div>
      <div class="kpi-card top-green">
        <div class="kpi-label">On Time / Early</div>
        <div class="kpi-value" style="color:${pctColor(M.ontimePct,80,60)}">${M.ontimePct !== null ? M.ontimePct+'%' : '—'}</div>
        <div class="kpi-sub">${M.ontime} of ${M.complete} deliveries</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Photo Compliance</div>
        <div class="kpi-value" style="color:${pctColor(M.photoPct,90,70)}">${M.photoPct !== null ? M.photoPct+'%' : '—'}</div>
        <div class="kpi-sub">${M.photos} of ${M.complete} deliveries</div>
      </div>
      <div class="kpi-card top-blue">
        <div class="kpi-label">Customers Notified</div>
        <div class="kpi-value">${M.sms}</div>
        <div class="kpi-sub">via SMS</div>
      </div>
    </div>

    <!-- MAIN ROW -->
    <div class="row row-3">

      <!-- DRIVER SCORECARDS -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Driver Performance — Today</span>
        </div>
        <div class="panel-body">
          <table class="dt" style="margin-top:4px">
            <thead><tr>
              <th>Driver / Asset</th>
              <th>Stops</th>
              <th style="min-width:90px">On Time</th>
              <th style="min-width:90px">Photos</th>
            </tr></thead>
            <tbody>
              ${drivers.map(d => {
                const otp = d.c ? Math.round(d.ot/d.c*100) : null;
                const php = d.c ? Math.round(d.ph/d.c*100) : null;
                const otc = pctColor(otp,80,60);
                const phc = pctColor(php,90,70);
                return `<tr>
                  <td><div class="dt-name">${d.name}</div><div class="dt-sub">${d.asset}</div></td>
                  <td>${d.c}/${d.t}</td>
                  <td><div class="bar-wrap"><span style="color:${otc};min-width:32px;text-align:right">${otp!==null?otp+'%':'—'}</span><div class="bar-track"><div class="bar-fill" style="width:${otp||0}%;background:${otc}"></div></div></div></td>
                  <td><div class="bar-wrap"><span style="color:${phc};min-width:32px;text-align:right">${php!==null?php+'%':'—'}</span><div class="bar-track"><div class="bar-fill" style="width:${php||0}%;background:${phc}"></div></div></div></td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <!-- 7-DAY TREND -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">7-Day Trend</span>
          <div style="display:flex;gap:12px;font-size:11px;color:#5a6080">
            <span><span style="display:inline-block;width:10px;height:3px;background:#f59e0b;vertical-align:middle;border-radius:2px;margin-right:3px"></span>On Time</span>
            <span><span style="display:inline-block;width:10px;height:3px;background:#10b981;vertical-align:middle;border-radius:2px;margin-right:3px"></span>Photos</span>
          </div>
        </div>
        <div class="panel-body" style="padding-top:16px">
          <div class="chart-wrap">
            <canvas id="trendChart" role="img" aria-label="7-day line chart of on-time and photo compliance percentages">7-day trend data loading.</canvas>
          </div>
          <table class="dt" style="margin-bottom:12px">
            <thead><tr>
              <th>Date</th><th>Stops</th><th>On Time</th><th>Photos</th>
            </tr></thead>
            <tbody>
              ${trend.map(t => `<tr>
                <td style="color:#9096b4">${t.label}</td>
                <td>${t.complete}/${t.total}</td>
                <td style="color:${pctColor(t.ontimePct,80,60)}">${t.ontimePct!==null?t.ontimePct+'%':'—'}</td>
                <td style="color:${pctColor(t.photoPct,90,70)}">${t.photoPct!==null?t.photoPct+'%':'—'}</td>
              </tr>`).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <!-- OPEN ISSUES -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Open Issues</span>
          <span class="panel-note">${M.pending} pending · ${M.noPhotoComp.length} no photo</span>
        </div>
        <div class="panel-body">
          ${(function() {
            const items = [
              ...M.pendStops.slice(0,5).map(s=>({type:'pending',order:s.orderNumber||'—',name:s.customerName||s.shipToName||'—',detail:s._driver||'Unassigned',badge:'badge-pending',label:'Pending'})),
              ...M.noPhotoComp.slice(0,5).map(s=>({type:'nophoto',order:s.orderNumber||'—',name:s.customerName||s.shipToName||'—',detail:s._driver||'Unknown',badge:'badge-nophoto',label:'No Photo'})),
            ].slice(0,10);
            if (!items.length) return '<div style="color:#5a6080;font-size:13px;padding:20px 0;text-align:center">No open issues</div>';
            return items.map(i=>`<div class="issue-item">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px">
                <span class="issue-order">${i.order}</span>
                <span class="badge ${i.badge}">${i.label}</span>
              </div>
              <div class="issue-customer">${i.name}</div>
              <div class="issue-detail">${i.detail}</div>
            </div>`).join('');
          })()}
        </div>
      </div>
    </div>

    <!-- BOTTOM ROW -->
    <div class="row row-2">

      <!-- FLEET STATUS -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Fleet Status — Today</span>
        </div>
        <div class="panel-body">
          <table class="dt" style="margin-top:4px">
            <thead><tr>
              <th>Asset</th><th>Driver</th><th>Stops</th><th>Status</th>
            </tr></thead>
            <tbody>
              ${todayRoutes.sort((a,b)=>(a.assetDescription||'').localeCompare(b.assetDescription||'')).map(r => {
                const stops = Object.values(r.stops || {});
                const done = stops.filter(isComplete).length;
                const allDone = stops.length > 0 && done === stops.length;
                return `<tr>
                  <td><div class="dt-name">${r.assetDescription || r.asset || r._routeId}</div></td>
                  <td style="text-align:left;color:#9096b4;font-size:12px">${r.driverName || '—'}</td>
                  <td>${done}/${stops.length}</td>
                  <td><span class="badge ${allDone?'badge-done':'badge-active'}">${allDone?'Done':'Active'}</span></td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <!-- SALES REP VOLUME -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Stops by Sales Rep — Today</span>
        </div>
        <div class="panel-body">
          <table class="dt" style="margin-top:4px">
            <thead><tr>
              <th>Rep</th><th>Total</th><th>Complete</th><th>% Done</th>
            </tr></thead>
            <tbody>
              ${salesList.map(s => {
                const cp = s.t ? Math.round(s.c/s.t*100) : 0;
                return `<tr>
                  <td style="font-weight:500">${s.rep}</td>
                  <td>${s.t}</td>
                  <td>${s.c}</td>
                  <td style="color:${pctColor(cp,80,60)}">${cp}%</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  `;

  // --- CHART ---
  if (trendChart) { trendChart.destroy(); trendChart = null; }
  const ctx = document.getElementById('trendChart');
  if (ctx) {
    trendChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: trend.map(t => t.label),
        datasets: [
          { label:'On Time / Early', data: trend.map(t=>t.ontimePct), borderColor:'#f59e0b', backgroundColor:'rgba(245,158,11,.08)', tension:.35, pointRadius:4, pointBackgroundColor:'#f59e0b', borderWidth:2, spanGaps:true },
          { label:'Photo Compliance', data: trend.map(t=>t.photoPct), borderColor:'#10b981', backgroundColor:'rgba(16,185,129,.08)', tension:.35, pointRadius:4, pointBackgroundColor:'#10b981', borderWidth:2, spanGaps:true },
        ],
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{display:false}, tooltip:{callbacks:{label: c => c.dataset.label + ': ' + (c.raw !== null ? c.raw + '%' : '—') }} },
        scales:{
          y:{ min:0, max:100, grid:{color:'#1a1d2b'}, ticks:{color:'#5a6080',font:{size:10},callback:v=>v+'%'} },
          x:{ grid:{display:false}, ticks:{color:'#5a6080',font:{size:10}} },
        },
      },
    });
  }
}

async function init() {
  const today = todayStr();
  document.getElementById('dateBadge').textContent = friendlyDate(today);

  try {
    const [routes, historical] = await Promise.all([
      fetchJSON('/routes'),
      fetchJSON('/historical'),
    ]);
    buildPage(routes, historical);
    document.getElementById('syncTime').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch(e) {
    document.getElementById('mainContent').innerHTML =
      '<div class="loading"><div class="error-box">Failed to load data: ' + e.message + '</div></div>';
    document.getElementById('syncTime').textContent = 'Error';
  }
}

function friendlyDate(ds) {
  const d = new Date(ds + 'T12:00:00');
  return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}

init();
setInterval(init, 120000);
</script>
</body>
</html>
