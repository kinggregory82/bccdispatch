<meta charset="UTF-8">

<title>BCC Dispatch Manager</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sidebar-w: 220px;
  --navy:   #1a2642;
  --navy2:  #243154;
  --accent: #2563eb;
  --accent2:#3b82f6;
  --green:  #16a34a;
  --green-bg:#dcfce7;
  --amber:  #d97706;
  --amber-bg:#fef3c7;
  --red:    #dc2626;
  --red-bg: #fee2e2;
  --blue-bg:#dbeafe;
  --bg:     #f1f5f9;
  --surface:#ffffff;
  --border: #e2e8f0;
  --text:   #0f172a;
  --muted:  #64748b;
  --light:  #94a3b8;
}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',system-ui,sans-serif;font-size:13px;background:var(--bg);color:var(--text);display:flex}

/* ── SIDEBAR ── */
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--navy);
  display:flex;flex-direction:column;
  height:100vh;overflow:hidden;
  box-shadow:2px 0 12px rgba(0,0,0,.15);
  z-index:10;
}
.sidebar-logo{
  padding:20px 18px 18px;
  border-bottom:1px solid rgba(255,255,255,.08);
  display:flex;align-items:center;gap:10px;
}
.logo-mark{
  width:34px;height:34px;border-radius:8px;
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:700;color:#fff;letter-spacing:-1px;
  flex-shrink:0;box-shadow:0 2px 8px rgba(37,99,235,.4);
}
.logo-text{color:#fff;font-weight:700;font-size:13px;line-height:1.3}
.logo-text small{display:block;color:rgba(255,255,255,.45);font-size:10px;font-weight:400;letter-spacing:.3px}

.nav{padding:12px 10px;flex:1;overflow-y:auto}
.nav-section{margin-bottom:20px}
.nav-label{font-size:9px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.3);padding:0 8px;margin-bottom:6px}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 10px;border-radius:6px;cursor:pointer;
  color:rgba(255,255,255,.6);font-size:13px;font-weight:500;
  transition:.15s;margin-bottom:2px;text-decoration:none;
}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-item.active{background:rgba(37,99,235,.3);color:#fff;border:1px solid rgba(37,99,235,.4)}
.nav-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}

.sidebar-bottom{padding:14px;border-top:1px solid rgba(255,255,255,.08)}
.user-chip{display:flex;align-items:center;gap:10px}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#1d4ed8);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;flex-shrink:0}
.user-info{line-height:1.3}
.user-name{color:#fff;font-size:12px;font-weight:600}
.user-role{color:rgba(255,255,255,.4);font-size:10px}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0}

/* ── TOP BAR ── */
.topbar{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.topbar-left h1{font-size:18px;font-weight:700;color:var(--text)}
.topbar-left p{font-size:12px;color:var(--muted);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:10px}
.date-nav{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:5px 10px}
.nav-arrow{background:none;border:none;cursor:pointer;color:var(--muted);font-size:14px;padding:0 2px;line-height:1}
.nav-arrow:hover{color:var(--text)}
.nav-arrow:disabled{opacity:.3;cursor:default}
input[type=date]#datePicker{background:none;border:none;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--text);cursor:pointer;outline:none;width:110px}
.today-btn{background:var(--accent);color:#fff;border:none;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;padding:5px 12px;border-radius:6px;cursor:pointer;letter-spacing:.2px}
.today-btn:hover{background:var(--accent2)}
.sync-pill{display:flex;align-items:center;gap:6px;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:11px;color:var(--muted)}
.sync-dot{width:6px;height:6px;border-radius:50%;background:#16a34a;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.refresh-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-family:'DM Sans',sans-serif;font-size:11px;color:var(--muted);cursor:pointer}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── SCROLL AREA ── */
.scroll{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px}

/* ── KPI ROW ── */
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;position:relative;overflow:hidden;transition:.2s}
.kpi:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);transform:translateY(-1px)}
.kpi-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:10px}
.kpi-icon.blue{background:var(--blue-bg)}
.kpi-icon.green{background:var(--green-bg)}
.kpi-icon.amber{background:var(--amber-bg)}
.kpi-icon.red{background:var(--red-bg)}
.kpi-label{font-size:11px;font-weight:500;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px}
.kpi-val{font-size:26px;font-weight:700;color:var(--text);line-height:1;font-variant-numeric:tabular-nums}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:4px}
.kpi-delta{display:inline-flex;align-items:center;gap:2px;font-size:10px;font-weight:600;padding:2px 5px;border-radius:4px;margin-top:3px}
.kpi-delta.up{background:var(--green-bg);color:var(--green)}
.kpi-delta.down{background:var(--red-bg);color:var(--red)}
.kpi-delta.neutral{background:var(--blue-bg);color:var(--accent)}

/* ── MID GRID ── */
.mid-grid{display:grid;grid-template-columns:1fr 340px;gap:16px}

/* ── MAP ── */
.map-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.panel-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.panel-title{font-size:13px;font-weight:700;color:var(--text)}
.panel-meta{font-size:11px;color:var(--muted)}
#deliveryMap{height:340px;width:100%}

/* ── MAP LEGEND ── */
.map-legend{display:flex;align-items:center;gap:14px;padding:8px 14px;border-top:1px solid var(--border);background:var(--bg)}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--muted)}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;opacity:.8}

/* ── RIGHT COLUMN ── */
.right-col{display:flex;flex-direction:column;gap:12px}

/* ── PANEL ── */
.panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.ph{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.pt{font-size:13px;font-weight:700;color:var(--text)}
.pn{font-size:11px;color:var(--muted)}
.view-all{font-size:11px;font-weight:600;color:var(--accent);cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif}

/* ── ALERTS ── */
.alert-item{display:flex;align-items:flex-start;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);transition:.15s}
.alert-item:last-child{border-bottom:none}
.alert-item:hover{background:var(--bg)}
.alert-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-top:1px}
.alert-icon.warn{background:var(--amber-bg);color:var(--amber)}
.alert-icon.info{background:var(--blue-bg);color:var(--accent)}
.alert-icon.err{background:var(--red-bg);color:var(--red)}
.alert-body{flex:1;min-width:0}
.alert-title{font-weight:600;font-size:12px;color:var(--text)}
.alert-detail{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.alert-time{font-size:10px;color:var(--light);white-space:nowrap;margin-top:2px}

/* ── COLLAPSIBLE ISSUES ── */
.issue-cat-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;cursor:pointer;border-bottom:1px solid var(--border)}
.issue-cat-hdr:hover{background:var(--bg)}
.issue-cat-label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.issue-count-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.chevron{font-size:10px;color:var(--light);transition:transform .2s;margin-left:6px}
.chevron.open{transform:rotate(180deg)}
.issue-body{display:none}
.issue-body.open{display:block}
.issue-row-item{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-bottom:1px solid var(--border)}
.issue-row-item:last-child{border-bottom:none}
.issue-row-item:hover{background:var(--bg)}
.issue-order{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent)}
.issue-name{font-size:12px;font-weight:600;color:var(--text);margin-top:1px}
.issue-drv{font-size:10px;color:var(--muted);margin-top:1px}

/* ── BADGE ── */
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px}
.badge-late{background:var(--red-bg);color:var(--red)}
.badge-nophoto{background:var(--amber-bg);color:var(--amber)}
.badge-transit{background:var(--blue-bg);color:var(--accent)}
.badge-done{background:var(--green-bg);color:var(--green)}
.badge-delayed{background:var(--red-bg);color:var(--red)}
.badge-site{background:#ede9fe;color:#7c3aed}

/* ── BOTTOM GRID ── */
.bottom-grid{display:grid;grid-template-columns:1fr 280px;gap:16px}

/* ── TABLE ── */
.tbl-wrap{overflow:auto;max-height:260px}
table{width:100%;border-collapse:collapse}
thead th{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:8px 12px;text-align:left;background:var(--bg);position:sticky;top:0;border-bottom:1px solid var(--border);white-space:nowrap}
tbody td{padding:8px 12px;font-size:12px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--bg)}
.tbl-order{font-family:'DM Mono',monospace;font-size:10px;color:var(--accent)}
.tbl-customer{font-weight:600;font-size:12px}
.tbl-city{font-size:11px;color:var(--muted)}
.tbl-driver{font-size:11px;color:var(--muted)}

/* ── FLEET STRIP ── */
.fleet-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;padding:12px}
.fleet-item{border:1px solid var(--border);border-radius:8px;padding:10px 12px;transition:.15s}
.fleet-item:hover{box-shadow:0 2px 8px rgba(0,0,0,.06)}
.fleet-asset{font-size:11px;font-weight:700;color:var(--text)}
.fleet-driver{font-size:10px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fleet-progress{margin-top:7px}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:4px}
.progress-fill{height:100%;border-radius:2px;transition:width .5s}
.fleet-stops{font-size:10px;color:var(--muted);display:flex;justify-content:space-between}

.empty{padding:20px;text-align:center;font-size:12px;color:var(--light)}
.debug-bar{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);margin-bottom:0}

@media(max-width:1200px){.mid-grid{grid-template-columns:1fr}.bottom-grid{grid-template-columns:1fr}.kpi-row{grid-template-columns:repeat(3,1fr)}}
</style>
</head>

const FIREBASE='https://bccsms-27c55-default-rtdb.firebaseio.com';
const DRIVER_MAP={'460':'Tyler Begley','985':'Mitch Warczinsky','392':'Tim Bailey','537':'Gary Rogers','320':'Larry Reid','396':'Mike Desutter','788':'Chad Billot','750':'Tim Bailey','481':'','627':''};

let leafletMap=null,mapMarkers=[],trendChart=null;
let cachedRoutes=null,cachedHistorical=null,cachedMileage=null;
let selectedDate=todayStr();

function todayStr(){const d=new Date();return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())}
function p(n){return String(n).padStart(2,'0')}
function offsetDate(ds,n){const d=new Date(ds+'T12:00:00');d.setDate(d.getDate()+n);return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())}
function nDaysAgo(n){return offsetDate(todayStr(),-n)}
function shortDate(ds){return new Date(ds+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'numeric',day:'numeric'})}
function friendlyDate(ds){const d=new Date(ds+'T12:00:00');return d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}

function resolveDriver(route){
  const n=(route.driverName||'').trim();if(n)return n;
  const a=(route.asset||'').trim();
  for(const[num,drv]of Object.entries(DRIVER_MAP)){if(a===num||a.startsWith(num+' '))return drv;}
  return '';
}

function cityFromAddress(addr){
  if(!addr)return null;
  const parts=addr.split(',');
  for(let i=1;i<parts.length;i++){
    const c=parts[i].trim().toLowerCase().replace(' mi','').replace(' michigan','').trim();
    if(CITY_COORDS[c])return c;
  }
  return null;
}

async function fetchJSON(path){
  const r=await fetch(FIREBASE+path+'.json');
  if(!r.ok)throw new Error('HTTP '+r.status);
  return r.json();
}

function getStops(route,routeId){
  const raw=route.stops;
  if(!raw||typeof raw!=='object')return[];
  return Object.entries(raw).map(([k,s])=>({
    ...s,_key:k,_routeId:routeId,
    _driver:resolveDriver(route),
    _asset:(route.assetDescription||route.asset||'').trim(),
    _date:route.date||'',
  }));
}

function isComplete(s){return(s.status||'').toLowerCase()==='complete'||(s.deliveryStatus||'').toLowerCase()==='delivered'||!!s.completedAt}
function hasPhoto(s){if(!s.pictures)return false;if(Array.isArray(s.pictures))return s.pictures.filter(Boolean).length>0;return Object.values(s.pictures).filter(Boolean).length>0}
function hasSms(s){return!!(s.smsSent&&(s.smsSent.departed||s.smsSent.advance))}
function minutesLate(s){try{const arr=s.arrivalTime||s.completedAt,eta=s.seedEta||s.calculatedEta;if(!arr||!eta)return null;return Math.round((new Date(arr)-new Date(eta))/60000);}catch(e){return null}}

function stopMinutes(s){
  /* Returns actual stop dwell time in minutes, or null if unavailable/zero */
  try{
    const arr=s.arrivalTime, dep=s.deliveryTime||s.completedAt;
    if(!arr||!dep) return null;
    const mins=Math.round((new Date(dep)-new Date(arr))/60000);
    return mins>0?mins:null; /* exclude zero or negative = bad data */
  }catch(e){return null}
}

function metrics(stops){
  const comp=stops.filter(isComplete),pend=stops.filter(s=>!isComplete(s));
  const ph=comp.filter(hasPhoto),sms=stops.filter(hasSms);
  const late=comp.filter(s=>{if(s.timing==='late')return true;if(s.timing==='early'||s.timing==='ontime')return false;const ml=minutesLate(s);return ml!==null&&ml>30;});
  const ontime=comp.filter(s=>{if(s.timing==='early'||s.timing==='ontime')return true;if(s.timing==='late')return false;const ml=minutesLate(s);return ml!==null&&ml<=30;});
  return{total:stops.length,complete:comp.length,pending:pend.length,ontime:ontime.length,late:late.length,photos:ph.length,sms:sms.length,
    ontimePct:comp.length?Math.round(ontime.length/comp.length*100):null,
    photoPct:comp.length?Math.round(ph.length/comp.length*100):null,
    completePct:stops.length?Math.round(comp.length/stops.length*100):null,
    compStops:comp,lateStops:late,noPhotoComp:comp.filter(s=>!hasPhoto(s))};
}

async function loadData(){
  try{
    document.getElementById('syncTime').textContent='Syncing…';
    const[routes,hist,mil]=await Promise.all([fetchJSON('/routes'),fetchJSON('/historical'),fetchJSON('/mileage')]);
    cachedRoutes=routes||{};cachedHistorical=hist||{};cachedMileage=mil||{};
    render();
    document.getElementById('syncTime').textContent=new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  }catch(e){
    document.getElementById('syncTime').textContent='Error';
    console.error(e);
  }
}

function initMap(){
  if(leafletMap)return;
  leafletMap=L.map('deliveryMap',{zoomControl:true,attributionControl:false}).setView([43.5,-84.0],7);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:18}).addTo(leafletMap);
  /* Yard marker */
  L.circleMarker([43.1392,-83.0836],{radius:8,fillColor:'#1a2642',fillOpacity:1,color:'#fff',weight:2}).addTo(leafletMap).bindPopup('<b>BCC Yard</b><br>Marlette, MI');
}

function updateMap(stops){
  if(!leafletMap)return;
  mapMarkers.forEach(m=>m.remove());mapMarkers=[];
  const cityCount={};
  stops.forEach(s=>{
    const city=cityFromAddress(s.address||s.deliveryAddress||'');
    if(city){cityCount[city]=(cityCount[city]||0)+1;}
  });
  const max=Math.max(1,...Object.values(cityCount));
  Object.entries(cityCount).forEach(([city,count])=>{
    const coords=CITY_COORDS[city];if(!coords)return;
    const pct=count/max;
    const r=8+pct*22;
    const color=pct>0.6?'#dc2626':pct>0.3?'#d97706':'#2563eb';
    const m=L.circleMarker(coords,{radius:r,fillColor:color,fillOpacity:.55,color:color,weight:1.5,opacity:.8})
      .addTo(leafletMap)
      .bindPopup(`<b>${city.split(' ').map(w=>w[0].toUpperCase()+w.slice(1)).join(' ')}</b><br>${count} stop${count>1?'s':''}`);
    mapMarkers.push(m);
  });
}

function render(){
  const ds=selectedDate,today=todayStr(),isToday=ds===today;
  document.getElementById('dateLabel').textContent=friendlyDate(ds);
  const h=new Date().getHours();
  document.getElementById('greeting').querySelector('span').textContent=friendlyDate(ds);
  document.querySelector('.topbar-left p').firstChild.textContent=(h<12?'Good morning':h<17?'Good afternoon':'Good evening')+' — ';

  const allSrc=Object.assign({},cachedHistorical,isToday?cachedRoutes:{});
  const dayRoutes=Object.entries(allSrc).filter(([,r])=>r&&r.date===ds);
  let allStops=[];dayRoutes.forEach(([id,r])=>{allStops=allStops.concat(getStops(r,id))});
  const M=metrics(allStops);

  document.getElementById('debugBar').textContent=
    `date=${ds} | routes=${dayRoutes.length} | stops=${allStops.length} | complete=${M.complete} | pending=${M.pending} | late=${M.lateStops.length}`;

  /* MILEAGE */
  let miles='—';
  if(cachedMileage&&cachedMileage.date===todayStr()&&parseFloat(cachedMileage.total||0)>0){
    miles=Math.round(cachedMileage.total).toLocaleString();
  } else {
    let s=0,any=false;
    dayRoutes.forEach(([,r])=>{const m=parseFloat(r.totalDeliveryMiles||0);if(m>0){s+=m;any=true;}});
    if(any)miles=Math.round(s).toLocaleString();
  }

  /* DRIVER */
  const driverMap={};
  allStops.forEach(s=>{
    const k=s._driver||'(unassigned)',asset=s._asset||'';
    if(!driverMap[k])driverMap[k]={name:k,asset,t:0,c:0,ot:0,ph:0,late:0,stopMins:[]};
    driverMap[k].t++;
    if(isComplete(s)){driverMap[k].c++;
      if(s.timing==='early'||s.timing==='ontime')driverMap[k].ot++;
      else{const ml=minutesLate(s);if(ml!==null&&ml<=30)driverMap[k].ot++;else if(ml!==null&&ml>30)driverMap[k].late++;}
      if(hasPhoto(s))driverMap[k].ph++;
      const sm=stopMinutes(s);if(sm!==null)driverMap[k].stopMins.push(sm);}
  });
  const drivers=Object.values(driverMap).sort((a,b)=>b.t-a.t);

  /* FLEET */
  const fleetMap={};
  dayRoutes.forEach(([id,r])=>{
    const asset=(r.assetDescription||r.asset||id).trim(),driver=resolveDriver(r);
    if(!fleetMap[asset])fleetMap[asset]={asset,driver,done:0,total:0};
    const stops=Object.values(r.stops||{});
    fleetMap[asset].total+=stops.length;fleetMap[asset].done+=stops.filter(isComplete).length;
    if(!fleetMap[asset].driver&&driver)fleetMap[asset].driver=driver;
  });
  const fleet=Object.values(fleetMap).sort((a,b)=>a.asset.localeCompare(b.asset));

  /* SALES consolidated */
  const salesMap={};
  allStops.forEach(s=>{const rep=(s.assignedSales||'—').trim()||'—';if(!salesMap[rep])salesMap[rep]={rep,t:0,c:0};salesMap[rep].t++;if(isComplete(s))salesMap[rep].c++;});

  /* LATE BY DRIVER */
  const lateByDriver={};
  M.lateStops.forEach(s=>{const d=s._driver||'Unknown';if(!lateByDriver[d])lateByDriver[d]=[];lateByDriver[d].push({...s,_ml:minutesLate(s)});});

  /* ALERTS: late deliveries + missing photos as alert items */
  const alerts=[
    ...M.lateStops.slice(0,3).map(s=>({type:'warn',title:s.customerName||s.shipToName||s.orderNumber,detail:`Late delivery — ${s._driver||'Unknown driver'}`,ml:minutesLate(s)})),
    ...M.noPhotoComp.slice(0,3).map(s=>({type:'info',title:s.customerName||s.shipToName||s.orderNumber,detail:`No photo on file — ${s._driver||'Unknown driver'}`,ml:null})),
  ];

  /* TREND */
  const trend=[];
  const tSrc=Object.assign({},cachedHistorical,cachedRoutes);
  for(let i=6;i>=0;i--){
    const tds=nDaysAgo(i);let ts=[];
    Object.entries(tSrc).forEach(([id,r])=>{if(r&&r.date===tds)ts=ts.concat(getStops(r,id))});
    const tm=metrics(ts);trend.push({label:shortDate(tds),...tm});
  }

  const pctC=(v,g,w)=>v===null?'var(--muted)':v>=g?'var(--green)':v>=w?'var(--amber)':'var(--red)';

  document.getElementById('mainContent').innerHTML=`
  <!-- KPI ROW -->
  <div class="kpi-row">
    <div class="kpi">
      <div class="kpi-icon blue">🚚</div>
      <div class="kpi-label">Routes Running</div>
      <div class="kpi-val">${dayRoutes.length}</div>
      <div class="kpi-sub">${M.total} stops total</div>
    </div>
    <div class="kpi">
      <div class="kpi-icon green">✅</div>
      <div class="kpi-label">Delivered</div>
      <div class="kpi-val" style="color:${M.completePct>=80?'var(--green)':M.completePct>=60?'var(--amber)':'var(--red)'}">${M.complete}</div>
      <div class="kpi-sub">${M.completePct!==null?M.completePct+'% of stops':'—'}</div>
    </div>
    <div class="kpi">
      <div class="kpi-icon ${M.pending===0?'green':M.pending<=5?'amber':'red'}">⏱️</div>
      <div class="kpi-label">On Time / Early</div>
      <div class="kpi-val" style="color:${pctC(M.ontimePct,80,60)}">${M.ontimePct!==null?M.ontimePct+'%':'—'}</div>
      <div class="kpi-sub">${M.ontime} of ${M.complete} deliveries</div>
    </div>
    <div class="kpi">
      <div class="kpi-icon ${M.photoPct>=90?'green':'amber'}">📸</div>
      <div class="kpi-label">Photo Compliance</div>
      <div class="kpi-val" style="color:${pctC(M.photoPct,90,70)}">${M.photoPct!==null?M.photoPct+'%':'—'}</div>
      <div class="kpi-sub">${M.photos} of ${M.complete} complete</div>
    </div>
    <div class="kpi">
      <div class="kpi-icon blue">📍</div>
      <div class="kpi-label">Miles Driven</div>
      <div class="kpi-val" style="font-size:${miles.length>4?'18px':'26px'}">${miles}</div>
      <div class="kpi-sub">${isToday?'Live today':'Route total'}</div>
    </div>
  </div>

  <!-- MID: MAP + ALERTS -->
  <div class="mid-grid">
    <div class="map-panel">
      <div class="panel-header">
        <span class="panel-title">Delivery Heat Map — Michigan</span>
        <span class="panel-meta">${allStops.length} stops · ${ds}</span>
      </div>
      <div id="deliveryMap"></div>
      <div class="map-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#2563eb"></div>1–2 stops</div>
        <div class="legend-item"><div class="legend-dot" style="background:#d97706"></div>3–5 stops</div>
        <div class="legend-item"><div class="legend-dot" style="background:#dc2626"></div>6+ stops</div>
        <div class="legend-item"><div class="legend-dot" style="background:#1a2642"></div>BCC Yard</div>
      </div>
    </div>

    <div class="right-col">

      <!-- ALERTS -->
      <div class="panel">
        <div class="ph">
          <span class="pt">Active Issues</span>
          <span class="pn">${alerts.length} flagged</span>
        </div>
        ${alerts.length===0
          ?'<div class="empty">No issues — clean day ✓</div>'
          :alerts.map(a=>`<div class="alert-item">
            <div class="alert-icon ${a.type==='warn'?'warn':'info'}">${a.type==='warn'?'⚠️':'📷'}</div>
            <div class="alert-body">
              <div class="alert-title">${(a.title||'').substring(0,28)}</div>
              <div class="alert-detail">${a.detail}</div>
              ${a.ml!==null?`<div class="alert-time">+${a.ml} min late</div>`:''}
            </div>
          </div>`).join('')
        }
      </div>

      <!-- ISSUES COLLAPSIBLE -->
      <div class="panel">
        <div class="ph"><span class="pt">Issue Log</span><span class="pn">${M.lateStops.length} late · ${M.noPhotoComp.length} no photo</span></div>

        <div class="issue-cat-hdr" onclick="toggleCat(this)">
          <span class="issue-cat-label">Late Deliveries</span>
          <div style="display:flex;align-items:center">
            <span class="issue-count-badge" style="background:${M.lateStops.length>0?'var(--red-bg)':'var(--green-bg)'};color:${M.lateStops.length>0?'var(--red)':'var(--green)'}">${M.lateStops.length}</span>
            <span class="chevron open">▾</span>
          </div>
        </div>
        <div class="issue-body open">
          ${M.lateStops.length===0?'<div class="empty">None — all on time ✓</div>':
            Object.entries(lateByDriver).map(([drv,stops])=>
              stops.slice(0,4).map(s=>`<div class="issue-row-item">
                <div>
                  <div class="issue-order">${s.orderNumber||'—'}</div>
                  <div class="issue-name">${(s.customerName||s.shipToName||'—').substring(0,24)}</div>
                  <div class="issue-drv">${drv}</div>
                </div>
                <span class="badge badge-late">${s._ml!==null?'+'+s._ml+'m':'LATE'}</span>
              </div>`).join('')
            ).join('')
          }
        </div>

        <div class="issue-cat-hdr" onclick="toggleCat(this)">
          <span class="issue-cat-label">Missing Photos</span>
          <div style="display:flex;align-items:center">
            <span class="issue-count-badge" style="background:${M.noPhotoComp.length>0?'var(--amber-bg)':'var(--green-bg)'};color:${M.noPhotoComp.length>0?'var(--amber)':'var(--green)'}">${M.noPhotoComp.length}</span>
            <span class="chevron open">▾</span>
          </div>
        </div>
        <div class="issue-body open">
          ${M.noPhotoComp.length===0?'<div class="empty">All deliveries have photos ✓</div>':
            M.noPhotoComp.slice(0,6).map(s=>`<div class="issue-row-item">
              <div>
                <div class="issue-order">${s.orderNumber||'—'}</div>
                <div class="issue-name">${(s.customerName||s.shipToName||'—').substring(0,24)}</div>
                <div class="issue-drv">${s._driver||'—'}</div>
              </div>
              <span class="badge badge-nophoto">NO PHOTO</span>
            </div>`).join('')
          }
        </div>
      </div>
    </div>
  </div>

  <!-- BOTTOM: STOPS TABLE + FLEET -->
  <div class="bottom-grid">

    <div class="panel">
      <div class="ph">
        <span class="pt">Driver Performance</span>
        <span class="pn">${isToday?'Live':'Historical'} · ${ds}</span>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th>Driver</th><th>Asset</th><th>Stops</th><th>On Time</th><th>Photos</th><th>Avg Stop</th>
          </tr></thead>
          <tbody>
          ${drivers.length===0?`<tr><td colspan="5" class="empty">No data</td></tr>`:
            drivers.map(d=>{
              const otp=d.c?Math.round(d.ot/d.c*100):null;
              const php=d.c?Math.round(d.ph/d.c*100):null;
              return`<tr>
                <td><div class="tbl-customer">${d.name}</div></td>
                <td><div class="tbl-driver">${d.asset}</div></td>
                <td style="font-variant-numeric:tabular-nums">${d.c}/${d.t}</td>
                <td><span style="font-weight:600;color:${pctC(otp,80,60)}">${otp!==null?otp+'%':'—'}</span></td>
                <td><span style="font-weight:600;color:${pctC(php,90,70)}">${php!==null?php+'%':'—'}</span></td>
                <td style="color:var(--muted)">${d.stopMins.length>0?Math.round(d.stopMins.reduce((a,b)=>a+b,0)/d.stopMins.length)+'m':'—'}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>

    <div class="panel">
      <div class="ph"><span class="pt">Fleet Status</span><span class="pn">${fleet.length} assets</span></div>
      <div class="fleet-grid">
        ${fleet.length===0?'<div class="empty" style="grid-column:span 2">No fleet data</div>':
          fleet.map(f=>{
            const pct=f.total>0?Math.round(f.done/f.total*100):0;
            const allDone=f.total>0&&f.done===f.total;
            const color=allDone?'var(--green)':pct>50?'var(--accent)':'var(--amber)';
            return`<div class="fleet-item">
              <div class="fleet-asset">${f.asset}</div>
              <div class="fleet-driver">${f.driver||'—'}</div>
              <div class="fleet-progress">
                <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
                <div class="fleet-stops"><span>${f.done}/${f.total} stops</span><span style="color:${color};font-weight:600">${allDone&&isToday?'DONE':pct+'%'}</span></div>
              </div>
            </div>`;
          }).join('')}
      </div>
    </div>
  </div>`;

  /* Init + update map */
  setTimeout(()=>{
    initMap();
    updateMap(allStops);
    leafletMap.invalidateSize();
  },100);
}

function toggleCat(hdr){
  const ch=hdr.querySelector('.chevron'),body=hdr.nextElementSibling;
  const open=body.classList.toggle('open');ch.classList.toggle('open',open);
}

function setDate(ds){
  const today=todayStr();if(ds>today)return;
  selectedDate=ds;
  document.getElementById('datePicker').value=ds;
  document.getElementById('nextBtn').disabled=ds>=today;
  if(cachedRoutes)render();
}

document.getElementById('datePicker').value=todayStr();
document.getElementById('datePicker').max=todayStr();
document.getElementById('datePicker').addEventListener('change',e=>setDate(e.target.value));
document.getElementById('prevBtn').addEventListener('click',()=>setDate(offsetDate(selectedDate,-1)));
document.getElementById('nextBtn').addEventListener('click',()=>setDate(offsetDate(selectedDate,1)));
document.getElementById('nextBtn').disabled=true;
document.getElementById('todayBtn').addEventListener('click',()=>setDate(todayStr()));

loadData();
setInterval(loadData,120000);
</script>
</body>
</html>
