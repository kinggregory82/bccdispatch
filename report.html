<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1.0">
<title>BCC Dispatch — Performance Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#f4f4f4;color:#111;font-family:'Roboto',sans-serif;min-height:100vh}

/* Login */
.login-shell{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f4f4f4}
.login-box{background:#fff;border-top:4px solid #cc0000;border:1px solid #ddd;border-top:4px solid #cc0000;
  padding:40px 36px;width:340px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.login-logo{display:block;height:60px;width:auto;margin:0 auto 20px}
.login-title{font-family:'Oswald',sans-serif;font-size:20px;font-weight:700;
  letter-spacing:.18em;text-transform:uppercase;color:#cc0000;text-align:center;margin-bottom:4px}
.login-sub{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.22em;
  text-transform:uppercase;color:#999;text-align:center;margin-bottom:24px}
.login-form-head{background:#111;color:#fff;padding:7px 14px;
  font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.20em;text-transform:uppercase;margin-bottom:14px}
.login-label{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.18em;
  text-transform:uppercase;color:#888;display:block;margin-bottom:5px}
.login-input{width:100%;background:#fafafa;border:1px solid #ccc;
  color:#111;font-family:'Oswald',sans-serif;font-size:16px;font-weight:600;
  padding:10px 12px;letter-spacing:.06em}
.login-input:focus{outline:0;border-color:#cc0000}
.login-error{color:#cc0000;font-family:'Oswald',sans-serif;font-size:11px;
  letter-spacing:.1em;text-transform:uppercase;font-weight:600;padding:8px 0 0;display:none}
.login-btn{width:100%;background:#cc0000;color:#fff;border:0;
  font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:.18em;
  text-transform:uppercase;font-weight:700;padding:11px;cursor:pointer;margin-top:18px}
.login-btn:hover{background:#a30000}

/* Header */
.dx-header{background:#111;border-bottom:4px solid #cc0000;padding:14px 28px;
  display:flex;align-items:center;justify-content:space-between}
.dx-brand{display:flex;align-items:center;gap:16px}
.dx-brand img{height:44px;width:auto}
.dx-divider{width:1px;height:34px;background:#2a2a2a}
.dx-product-name{font-family:'Oswald',sans-serif;font-size:19px;font-weight:700;
  letter-spacing:.16em;text-transform:uppercase;color:#cc0000;display:block}
.dx-product-sub{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.20em;
  text-transform:uppercase;color:#555;display:block;margin-top:2px}
.dx-topright{font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.16em;
  text-transform:uppercase;color:#555;display:flex;align-items:center;gap:12px}
.dx-topright b{color:#bbb}
.dx-avatar{width:30px;height:30px;background:#cc0000;color:#fff;
  display:inline-flex;align-items:center;justify-content:center;
  font-family:'Oswald',sans-serif;font-weight:700;font-size:13px}
.dx-lock-btn{background:transparent;border:1px solid #2a2a2a;color:#555;
  font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.14em;
  text-transform:uppercase;padding:5px 10px;cursor:pointer}
.dx-lock-btn:hover{border-color:#cc0000;color:#cc0000}

/* Toolbar */
.rp-toolbar{background:#fff;border-bottom:2px solid #e8e8e8;
  padding:14px 28px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.rp-label{font-family:'Oswald',sans-serif;font-size:10px;letter-spacing:.18em;
  text-transform:uppercase;color:#888}
.rp-input{background:#fff;border:1px solid #ccc;color:#111;
  font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;
  padding:7px 10px;letter-spacing:.04em}
.rp-input:focus{outline:0;border-color:#cc0000}
.rp-btn{background:#cc0000;color:#fff;border:0;
  font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.16em;
  text-transform:uppercase;font-weight:700;padding:9px 16px;cursor:pointer}
.rp-btn:hover{background:#a30000}
.rp-btn.sec{background:#e8e8e8;color:#555;border:1px solid #ccc}
.rp-btn.sec:hover{background:#ddd;color:#111}

/* KPI Bar */
.kpi-bar{display:flex;gap:0;border-bottom:2px solid #e8e8e8;background:#fff;overflow-x:auto}
.kpi{flex:1;min-width:100px;padding:16px 18px;border-right:1px solid #e8e8e8;text-align:center}
.kpi:last-child{border-right:0}
.kpi-label{font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:.22em;
  text-transform:uppercase;color:#999;margin-bottom:5px}
.kpi-value{font-family:'Oswald',sans-serif;font-size:28px;font-weight:700;color:#111;line-height:1}
.kpi-value.red{color:#cc0000}
.kpi-value.green{color:#16a34a}
.kpi-value.amber{color:#d97706}

/* Body */
.rp-body{padding:20px 28px 80px;display:grid;gap:16px}

/* Sections */
.rp-section{background:#fff;border:1px solid #e0e0e0;border-top:3px solid #cc0000}
.rp-section-head{padding:11px 18px;border-bottom:1px solid #e8e8e8;
  display:flex;align-items:center;gap:10px;background:#fafafa}
.rp-section-title{font-family:'Oswald',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:.22em;text-transform:uppercase;color:#cc0000}
.rp-section-count{font-family:'Oswald',sans-serif;font-size:11px;color:#bbb;letter-spacing:.08em}

/* Tables */
.rp-table-wrap{overflow-x:auto}
table.rp-table{width:100%;border-collapse:collapse;font-size:13px}
table.rp-table th{font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:.18em;
  text-transform:uppercase;color:#888;background:#f5f5f5;padding:9px 14px;
  text-align:left;border-bottom:2px solid #e0e0e0;white-space:nowrap;cursor:pointer;user-select:none}
table.rp-table th:hover{color:#cc0000}
table.rp-table td{padding:10px 14px;border-bottom:1px solid #f0f0f0;vertical-align:middle;color:#222}
table.rp-table tbody tr:hover{background:#fafafa}
.rp-order{font-family:'Oswald',sans-serif;font-size:13px;letter-spacing:.06em;color:#111;font-weight:600}
.rp-num{font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;color:#111}
.sort-arr{color:#cc0000;margin-left:3px}

/* Badges */
.rp-badge{font-family:'Oswald',sans-serif;font-size:9px;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;padding:2px 8px;border:1.5px solid;display:inline-block}
.rp-badge.early{color:#16a34a;border-color:#16a34a}
.rp-badge.ontime{color:#16a34a;border-color:#16a34a}
.rp-badge.late{color:#cc0000;border-color:#cc0000}
.rp-badge.complete{color:#16a34a;border-color:#16a34a}
.rp-badge.pending{color:#999;border-color:#ddd}
.rp-badge.sms-sent{color:#16a34a;border-color:#16a34a}
.rp-badge.sms-advance{color:#2563eb;border-color:#2563eb}
.rp-badge.sms-fail{color:#cc0000;border-color:#cc0000}
.rp-badge.sms-none{color:#bbb;border-color:#e0e0e0}
.rp-badge.photo{color:#2563eb;border-color:#2563eb}

/* Progress bars */
.rp-pct-bar{display:flex;height:5px;background:#f0f0f0;width:80px;margin-top:5px}
.rp-pct-fill{height:100%;background:#cc0000}
.rp-pct-fill.green{background:#16a34a}
.rp-pct-fill.amber{background:#d97706}

/* Cards */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1px;background:#e0e0e0}
.card{background:#fff;padding:16px 20px}
.card-label{font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:.20em;
  text-transform:uppercase;color:#999;margin-bottom:6px}
.card-val{font-family:'Oswald',sans-serif;font-size:26px;font-weight:700;color:#111}
.card-sub{font-size:11px;color:#aaa;margin-top:3px}

/* Misc */
.rp-empty{padding:40px;text-align:center;color:#bbb;font-family:'Oswald',sans-serif;
  font-size:13px;letter-spacing:.12em;text-transform:uppercase}
.rp-toast{position:fixed;bottom:24px;right:24px;background:#111;color:#fff;
  padding:10px 18px;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:.12em;
  text-transform:uppercase;display:none;z-index:9999}
</style>
</head>

// ── Helpers ──────────────────────────────────────────────────────────────────
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function toast(msg,err=false){
  const el=document.getElementById('rp-toast');
  el.textContent=msg; el.style.background=err?'#cc0000':'#222'; el.style.display='block';
  setTimeout(()=>el.style.display='none',2800);
}
async function dbGet(path){
  const r=await fetch(`${DB}/${path}.json`);
  if(!r.ok) throw new Error(`DB ${r.status}`);
  return r.json();
}
function fmtTime(iso){
  if(!iso) return '—';
  const d=new Date(iso);
  if(isNaN(d)) return '—';
  return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
}
function minsToHM(mins){
  if(!mins && mins!==0) return '—';
  const h=Math.floor(mins/60), m=Math.round(mins%60);
  return h>0 ? `${h}h ${m}m` : `${m}m`;
}
function pct(n,d){ return d>0 ? Math.round(n/d*100) : 0; }
function bar(n,d,cls=''){
  const p=pct(n,d);
  return `<div class="rp-pct-bar"><div class="rp-pct-fill ${cls}" style="width:${p}%"></div></div>`;
}

const DRIVER_MAP = {
  '460 Boom':'Tyler Begley','985 Boom':'Mitch Warczinsky',
  '392 Boom':'Tim Bailey','537 Boom':'Gary Rogers',
  '015':'Nick Harris','320 Moffett':'Larry Reid',
  '396 Moffett':'Mike Desutter','788 Moffett Tarpside':'Chad Billot',
  '750':'Tim Bailey',
};
function driverFromAsset(a){
  if(!a) return '';
  for(const [k,v] of Object.entries(DRIVER_MAP)) if(a.includes(k)) return v;
  return '';
}

function getTiming(s){
  // Historical data stores pre-computed timing field
  if(s.timing) return s.timing;
  if(s.status!=='complete') return null;
  const actual=s.arrivalTime||s.deliveryTime||s.completedAt;
  if(!actual) return null;
  const anchor=s.calculatedEta||s.seedEta;
  if(!anchor) return null;
  const aMs=new Date(actual).getTime(), anMs=new Date(anchor).getTime();
  if(aMs<anMs) return 'early';
  if(aMs<=anMs+30*60000) return 'ontime';
  return 'late';
}

// ── DATA LOADING ──────────────────────────────────────────────────────────────
let STOPS=[]; // flat array of all stop objects for current range

async function loadReport(){
  const from=document.getElementById('rp-from').value;
  const to  =document.getElementById('rp-to').value;
  if(!from||!to){ toast('Set both dates',true); return; }
  document.getElementById('rp-body').innerHTML='<div class="rp-empty">Loading…</div>';
  document.getElementById('rp-kpi-bar').style.display='none';

  // Build date list
  const dates=[]; let cur=new Date(from+'T00:00:00'); const end=new Date(to+'T00:00:00');
  while(cur<=end){ dates.push(cur.toISOString().slice(0,10)); cur.setDate(cur.getDate()+1); }

  try{
    const [liveRoutes, histRoutes] = await Promise.all([
      dbGet('routes'), dbGet('historical')
    ]);
    const allRoutes = Object.assign({}, liveRoutes||{}, histRoutes||{});
    if(!Object.keys(allRoutes).length){ document.getElementById('rp-body').innerHTML='<div class="rp-empty">No data.</div>'; return; }

    STOPS=[];
    Object.entries(allRoutes).forEach(([rid,route])=>{
      if(!route||!route.date) return;
      if(route.date<from||route.date>to) return;
      const asset=route.assetDescription||route.asset||'';
      const driver=route.driverName||driverFromAsset(asset)||'';
      const miles=route.totalDeliveryMiles||null;
      Object.entries(route.stops||{}).forEach(([sid,stop])=>{
        if(!stop) return;
        const timing=getTiming(stop);
        const smsStatus=(() => {
          const sms=stop.smsSent||{};
          if(sms.departed||sms.at) return 'sent';
          if(sms.advance) return 'advance';
          if(sms.fail) return 'fail';
          return 'none';
        })();
        STOPS.push({
          routeId:     rid,
          routeDate:   route.date,
          asset,
          driver,
          totalDeliveryMiles: miles,
          orderNumber: stop.orderNumber||'',
          customerName:stop.customerName||'',
          address:     stop.address||'',
          assignedSales:stop.assignedSales||'',
          orderDate:   stop.orderDate||'',
          reqDate:     (stop.reqDate||'').slice(0,10),
          status:      stop.status||'pending',
          deliveryStatus:stop.deliveryStatus||'',
          arrivalTime: stop.arrivalTime||'',
          deliveryTime:stop.deliveryTime||'',
          completedAt: stop.completedAt||'',
          calculatedEta:stop.calculatedEta||'',
          seedEta:     stop.seedEta||'',
          orderStopTime:stop.orderStopTime||null,
          hasPics:     !!(stop.pictures&&stop.pictures.length)||(stop.signatures&&stop.signatures.length),
          smsStatus,
          smsAdvanceBody:stop.smsSent&&stop.smsSent.advanceBody||'',
          smsTrackerBody:stop.smsSent&&stop.smsSent.trackerBody||'',
          timing,
          sameDay:     stop.orderDate&&stop.orderDate===route.date,
          distanceMiles: stop.distanceMiles||null,
        });
      });
    });

    if(!STOPS.length){ document.getElementById('rp-body').innerHTML='<div class="rp-empty">No stops in range.</div>'; return; }
    renderKPIs();
    renderReport();
  } catch(e){ toast(e.message,true); }
}

// ── KPIs ──────────────────────────────────────────────────────────────────────
function renderKPIs(){
  const completed=STOPS.filter(s=>s.status==='complete');
  const total=STOPS.length, comp=completed.length;
  const early=completed.filter(s=>s.timing==='early').length;
  const ontime=completed.filter(s=>s.timing==='ontime').length;
  const late=completed.filter(s=>s.timing==='late').length;
  const eligible=early+ontime+late;
  const smsFail=STOPS.filter(s=>s.smsStatus==='fail').length;
  const smsSent=STOPS.filter(s=>s.smsStatus==='sent'||s.smsStatus==='advance').length;
  const photos=completed.filter(s=>s.hasPics).length;
  const sameDay=STOPS.filter(s=>s.sameDay).length;
  // Total mileage: sum unique route totalDeliveryMiles
  const routeMiles={};
  STOPS.forEach(s=>{ if(s.routeId&&s.totalDeliveryMiles) routeMiles[s.routeId]=s.totalDeliveryMiles; });
  const totalMiles=Math.round(Object.values(routeMiles).reduce((a,b)=>a+b,0));
  const el=document.getElementById('rp-kpi-bar');
  el.style.display='flex';
  el.innerHTML=`
    <div class="kpi"><div class="kpi-label">Stops</div><div class="kpi-value">${total}</div></div>
    <div class="kpi"><div class="kpi-label">Delivered</div><div class="kpi-value green">${comp}</div></div>
    <div class="kpi"><div class="kpi-label">Early</div><div class="kpi-value green">${eligible?pct(early,eligible):0}%</div></div>
    <div class="kpi"><div class="kpi-label">On Time</div><div class="kpi-value green">${eligible?pct(ontime,eligible):0}%</div></div>
    <div class="kpi"><div class="kpi-label">Late</div><div class="kpi-value ${late?'red':''}">${eligible?pct(late,eligible):0}%</div></div>
    <div class="kpi"><div class="kpi-label">Same Day</div><div class="kpi-value">${pct(sameDay,total)}%</div></div>
    <div class="kpi"><div class="kpi-label">SMS Sent</div><div class="kpi-value green">${smsSent}</div></div>
    <div class="kpi"><div class="kpi-label">SMS Fail</div><div class="kpi-value ${smsFail?'red':''}">${smsFail}</div></div>
    <div class="kpi"><div class="kpi-label">Photo %</div><div class="kpi-value ${comp&&pct(photos,comp)<80?'amber':'green'}">${comp?pct(photos,comp):0}%</div></div>
    <div class="kpi"><div class="kpi-label">Total Miles</div><div class="kpi-value">${totalMiles||'—'}</div></div>
  `;
}

// ── REPORT SECTIONS ───────────────────────────────────────────────────────────
function renderReport(){
  const body=document.getElementById('rp-body');
  body.innerHTML='';
  body.appendChild(sectionByDriver());
  body.appendChild(sectionBySalesman());
  body.appendChild(sectionByZone());
  body.appendChild(sectionMultiStop());
  body.appendChild(sectionSMS());
}

function section(title, content, count=''){
  const div=document.createElement('div');
  div.className='rp-section';
  div.innerHTML=`
    <div class="rp-section-head">
      <span class="rp-section-title">${title}</span>
      ${count?`<span class="rp-section-count">${count}</span>`:''}
    </div>
    <div class="rp-section-body">${content}</div>`;
  return div;
}

// ── BY DRIVER ─────────────────────────────────────────────────────────────────
function sectionByDriver(){
  const drivers={};
  STOPS.forEach(s=>{
    const k=s.driver||s.asset||'Unknown';
    if(!drivers[k]) drivers[k]={driver:k,asset:s.asset,stops:0,delivered:0,early:0,ontime:0,late:0,eligible:0,stopMins:[],hasPics:0,smsFail:0};
    const d=drivers[k];
    d.stops++;
    if(s.status==='complete'){
      d.delivered++;
      if(s.hasPics) d.hasPics++;
      if(s.timing){ d.eligible++; d[s.timing]++; }
      if(s.orderStopTime) d.stopMins.push(s.orderStopTime);
    }
    if(s.smsStatus==='fail') d.smsFail++;
  });
  const rows=Object.values(drivers).sort((a,b)=>b.delivered-a.delivered);
  const tbody=rows.map(d=>{
    const avgStop=d.stopMins.length ? Math.round(d.stopMins.reduce((a,b)=>a+b,0)/d.stopMins.length) : null;
    const onPct=d.eligible?pct(d.ontime+d.early,d.eligible):0;
    return `<tr>
      <td><span class="rp-num">${esc(d.driver)}</span><br><span style="color:#aaa;font-size:11px">${esc(d.asset)}</span></td>
      <td class="rp-num">${d.stops}</td>
      <td class="rp-num">${d.delivered}</td>
      <td><span class="rp-num">${d.eligible?onPct:'-'}${d.eligible?'%':''}</span>${d.eligible?bar(d.ontime+d.early,d.eligible,'green'):''}</td>
      <td class="rp-num ${d.smsFail?'red':''}">${d.smsFail||'—'}</td>
      <td><span class="rp-num ${d.delivered&&pct(d.hasPics,d.delivered)<80?'red':''}">${d.delivered?pct(d.hasPics,d.delivered):'-'}${d.delivered?'%':''}</span>${d.delivered?bar(d.hasPics,d.delivered,'green'):''}</td>
      <td class="rp-num">${avgStop?minsToHM(avgStop):'—'}</td>
    </tr>`;
  }).join('');
  const thead=`<th>Driver</th><th>Stops</th><th>Delivered</th><th>On-Time %</th><th>SMS Fail</th><th>Photo %</th><th>Avg Stop Time</th>`;
  return section('Driver Performance',`<div class="rp-table-wrap"><table class="rp-table"><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table></div>`,`${Object.keys(drivers).length} drivers`);
}

// ── BY SALESMAN ───────────────────────────────────────────────────────────────
function sectionBySalesman(){
  const reps={};
  STOPS.forEach(s=>{
    const k=s.assignedSales||'(none)';
    if(!reps[k]) reps[k]={rep:k,stops:0,delivered:0,smsFail:0,noPhone:0,sameDay:0};
    reps[k].stops++;
    if(s.status==='complete') reps[k].delivered++;
    if(s.smsStatus==='fail') reps[k].smsFail++;
    if(s.smsStatus==='none') reps[k].noPhone++;
    if(s.sameDay) reps[k].sameDay++;
  });
  const rows=Object.values(reps).sort((a,b)=>b.stops-a.stops);
  const tbody=rows.map(r=>`<tr>
    <td class="rp-num">${esc(r.rep)}</td>
    <td class="rp-num">${r.stops}</td>
    <td class="rp-num">${r.delivered}</td>
    <td class="rp-num ${r.smsFail?'red':''}">${r.smsFail||'—'}</td>
    <td class="rp-num ${r.noPhone?'amber':''}">${r.noPhone||'—'}</td>
    <td class="rp-num">${r.sameDay||'—'}</td>
  </tr>`).join('');
  const thead=`<th>Sales Rep</th><th>Stops</th><th>Delivered</th><th>SMS Fail</th><th>No Phone</th><th>Same Day</th>`;
  return section('By Sales Rep',`<div class="rp-table-wrap"><table class="rp-table"><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table></div>`,`${Object.keys(reps).length} reps`);
}

// ── BY ZONE ───────────────────────────────────────────────────────────────────
const ZONES=[
  {label:'0 – 10 mi',  min:0,   max:10},
  {label:'11 – 25 mi', min:11,  max:25},
  {label:'26 – 50 mi', min:26,  max:50},
  {label:'51 – 75 mi', min:51,  max:75},
  {label:'76 – 100 mi',min:76,  max:100},
  {label:'100+ mi',    min:101, max:Infinity},
];

function getZone(stop){
  // Use per-stop distanceMiles if available, else estimate from route
  const d = stop.distanceMiles || (stop.totalDeliveryMiles ? Math.round(stop.totalDeliveryMiles * 0.6) : null);
  if(!d) return null;
  return ZONES.find(z=>d>=z.min&&d<=z.max)||null;
}

function sectionByZone(){
  // Build rep → zone → count
  const reps={};
  let hasDistData=false;
  STOPS.forEach(s=>{
    if(s.status!=='complete') return;
    const z=getZone(s);
    if(!z) return;
    if(s.distanceMiles) hasDistData=true;
    const rep=s.assignedSales||'(none)';
    if(!reps[rep]) reps[rep]={rep, total:0};
    ZONES.forEach(zz=>{ if(!reps[rep][zz.label]) reps[rep][zz.label]=0; });
    reps[rep][z.label]=(reps[rep][z.label]||0)+1;
    reps[rep].total++;
  });

  if(!Object.keys(reps).length) return section('Deliveries by Zone','<div class="rp-empty">No delivered stops with distance data in range.</div>');

  const note = hasDistData ? '' :
    `<div style="padding:8px 14px;background:#fffbeb;font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:.14em;color:#92400e;border-bottom:1px solid #fde68a">
      Distance estimated from route mileage — run push_historical.py with distance calculation for precise data
    </div>`;

  const rows=Object.values(reps).sort((a,b)=>b.total-a.total);
  const thead=`<th>Sales Rep</th>${ZONES.map(z=>`<th>${z.label}</th>`).join('')}<th>Total</th>`;
  const tbody=rows.map(r=>`<tr>
    <td class="rp-num">${esc(r.rep)}</td>
    ${ZONES.map(z=>`<td class="rp-num">${r[z.label]||'—'}</td>`).join('')}
    <td class="rp-num" style="font-weight:700">${r.total}</td>
  </tr>`).join('');

  // Totals row
  const totals=ZONES.map(z=>Object.values(reps).reduce((s,r)=>s+(r[z.label]||0),0));
  const grandTotal=totals.reduce((a,b)=>a+b,0);
  const tfoot=`<tr style="border-top:2px solid #e0e0e0;font-weight:700">
    <td class="rp-num" style="color:#cc0000">TOTAL</td>
    ${totals.map(t=>`<td class="rp-num">${t||'—'}</td>`).join('')}
    <td class="rp-num" style="font-weight:700">${grandTotal}</td>
  </tr>`;

  return section('Deliveries by Salesman by Zone',
    note+`<div class="rp-table-wrap"><table class="rp-table"><thead><tr>${thead}</tr></thead><tbody>${tbody}${tfoot}</tbody></table></div>`,
    `${Object.keys(reps).length} reps`);
}

// ── MULTI-STOP SAME ADDRESS ───────────────────────────────────────────────────
function sectionMultiStop(){
  // Group by salesman → date → address, find where count > 1
  const groups={};
  STOPS.forEach(s=>{
    if(!s.address) return;
    const key=`${s.assignedSales||'none'}|${s.routeDate}|${s.address.trim().toUpperCase()}`;
    if(!groups[key]) groups[key]={rep:s.assignedSales||'(none)',date:s.routeDate,address:s.address,orders:[],driver:s.driver};
    groups[key].orders.push(s.orderNumber);
  });
  const dupes=Object.values(groups).filter(g=>g.orders.length>1).sort((a,b)=>b.orders.length-a.orders.length||a.date.localeCompare(b.date));

  if(!dupes.length) return section('Multiple Stops — Same Address','<div class="rp-empty">No same-address multi-stop occurrences in range.</div>');

  const tbody=dupes.map(g=>`<tr>
    <td style="color:#999;font-size:11px">${esc(g.date)}</td>
    <td class="rp-num">${esc(g.rep)}</td>
    <td>${esc(g.address)}</td>
    <td style="color:#aaa">${esc(g.driver||'—')}</td>
    <td class="rp-num" style="color:#cc0000;font-weight:700">${g.orders.length}</td>
    <td style="font-size:11px;color:#888">${g.orders.map(o=>esc(o)).join('<br>')}</td>
  </tr>`).join('');

  return section('Multiple Stops — Same Address Same Day',
    `<div class="rp-table-wrap"><table class="rp-table">
      <thead><tr><th>Date</th><th>Sales</th><th>Address</th><th>Driver</th><th>Orders</th><th>Order #s</th></tr></thead>
      <tbody>${tbody}</tbody>
    </table></div>`,
    `${dupes.length} occurrences`);
}

// ── SMS SECTION ───────────────────────────────────────────────────────────────
function sectionSMS(){
  const sent=STOPS.filter(s=>s.smsStatus==='sent');
  const advance=STOPS.filter(s=>s.smsStatus==='advance');
  const fail=STOPS.filter(s=>s.smsStatus==='fail');
  const none=STOPS.filter(s=>s.smsStatus==='none');
  const cards=`
    <div class="card-grid">
      <div class="card"><div class="card-label">Tracker SMS Sent</div><div class="card-val">${sent.length}</div><div class="card-sub">${pct(sent.length,STOPS.length)}% of all stops</div></div>
      <div class="card"><div class="card-label">Advance SMS Sent</div><div class="card-val">${advance.length}</div><div class="card-sub">${pct(advance.length,STOPS.length)}% of all stops</div></div>
      <div class="card"><div class="card-label">SMS Failed</div><div class="card-val" style="color:${fail.length?'#cc0000':'#16a34a'}">${fail.length}</div><div class="card-sub">Bad phone or opt-out</div></div>
      <div class="card"><div class="card-label">No Phone</div><div class="card-val" style="color:${none.length?'#d97706':'#16a34a'}">${none.length}</div><div class="card-sub">No contact on order</div></div>
    </div>`;
  const failRows=fail.map(s=>`<tr>
    <td style="color:#999;font-size:11px">${esc(s.routeDate)}</td>
    <td class="rp-order">${esc(s.orderNumber)}</td>
    <td>${esc(s.customerName)}</td>
    <td style="color:#888">${esc(s.assignedSales||'—')}</td>
    <td style="color:#555">${esc(s.address)}</td>
  </tr>`).join('');
  const failTable=fail.length?`
    <div style="margin-top:1px">
      <div style="padding:8px 14px;background:#fff0f0;font-family:'Oswald',sans-serif;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:#cc0000;border-top:1px solid #fcc">Failed SMS — Action Required</div>
      <div class="rp-table-wrap"><table class="rp-table">
        <thead><tr><th>Date</th><th>Order</th><th>Customer</th><th>Sales</th><th>Address</th></tr></thead>
        <tbody>${failRows}</tbody>
      </table></div>
    </div>`:'';
  return section('SMS Performance', cards+failTable);
}

// ── CSV EXPORT ────────────────────────────────────────────────────────────────
function exportCSV(){
  if(!STOPS.length){ toast('Generate report first',true); return; }
  const headers=['Date','Route','Driver','Asset','Order#','Customer','Address','Sales','Status',
    'Timing','SMS Status','Has Photos','Stop Time (min)','Same Day','Order Date','Req Date',
    'Route Miles','Distance Miles'];
  const rows=STOPS.map(s=>[
    s.routeDate,s.routeId,s.driver,s.asset,s.orderNumber,s.customerName,s.address,
    s.assignedSales,s.status,s.timing||'',s.smsStatus,s.hasPics?'Yes':'No',
    s.orderStopTime||'',s.sameDay?'Yes':'No',s.orderDate,s.reqDate,
    s.totalDeliveryMiles||'',s.distanceMiles||''
  ].map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(','));
  const csv=[headers.join(','),...rows].join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`bcc-report-${document.getElementById('rp-from').value}-${document.getElementById('rp-to').value}.csv`;
  a.click(); URL.revokeObjectURL(url);
  toast('CSV downloaded');
}
