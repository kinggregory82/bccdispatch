<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280, initial-scale=1.0">
<title>BCC Dispatch — Activity Report</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #fff; color: #111; font-family: 'Roboto', sans-serif; min-height: 100vh; }

.dx-header { background: #111; border-bottom: 5px solid #cc0000; padding: 14px 28px;
  display: flex; align-items: center; justify-content: space-between; }
.dx-brand { display: flex; align-items: center; gap: 18px; }
.dx-divider { width: 1px; height: 36px; background: #2c2c2c; }
.dx-product { font-family: 'Oswald', sans-serif; text-transform: uppercase; }
.dx-product-name { display: block; font-size: 20px; font-weight: 700; letter-spacing: 0.16em; color: #cc0000; }
.dx-product-sub { display: block; font-size: 11px; letter-spacing: 0.20em; color: #aaa; margin-top: 2px; }
.dx-user { font-family: 'Oswald', sans-serif; font-size: 12px; letter-spacing: 0.18em;
  text-transform: uppercase; color: #aaa; display: flex; align-items: center; gap: 12px; }
.dx-user b { color: #fff; }
.dx-avatar { width: 32px; height: 32px; background: #cc0000; color: #fff;
  display: inline-flex; align-items: center; justify-content: center;
  font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 14px; }
.dx-signout-btn { background: transparent; border: 1px solid #2c2c2c; color: #aaa;
  font-family: 'Oswald', sans-serif; font-size: 10px; letter-spacing: 0.16em;
  text-transform: uppercase; font-weight: 600; padding: 5px 10px; cursor: pointer; }
.dx-signout-btn:hover { border-color: #cc0000; color: #cc0000; }

.rp-toolbar { background: #fafafa; border-bottom: 1px solid #e0e0e0;
  padding: 16px 28px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.rp-toolbar label { font-family: 'Oswald', sans-serif; font-size: 11px;
  letter-spacing: 0.18em; text-transform: uppercase; color: #888; margin-right: 4px; }
.rp-input { font-family: 'Oswald', sans-serif; font-size: 14px; font-weight: 600;
  color: #111; padding: 7px 10px; border: 1px solid #ccc; background: #fff; }
.rp-input:focus { outline: 0; border-color: #cc0000; }
.rp-btn { background: #cc0000; color: #fff; border: 0;
  font-family: 'Oswald', sans-serif; font-size: 12px; letter-spacing: 0.16em;
  text-transform: uppercase; font-weight: 600; padding: 9px 18px; cursor: pointer; }
.rp-btn:hover { background: #a30000; }
.rp-btn.secondary { background: #111; }
.rp-btn.secondary:hover { background: #333; }
.rp-summary { margin-left: auto; display: flex; gap: 24px; }
.rp-stat { text-align: right; }
.rp-stat-label { font-family: 'Oswald', sans-serif; font-size: 10px;
  letter-spacing: 0.18em; text-transform: uppercase; color: #888; }
.rp-stat-value { font-family: 'Oswald', sans-serif; font-size: 22px;
  font-weight: 700; color: #111; }

.rp-filters { background: #fff; border-bottom: 1px solid #e0e0e0;
  padding: 10px 28px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.rp-filter-label { font-family: 'Oswald', sans-serif; font-size: 10px;
  letter-spacing: 0.18em; text-transform: uppercase; color: #888; }
.rp-filter-btn { background: #fff; border: 1px solid #ddd; color: #888;
  font-family: 'Oswald', sans-serif; font-size: 10px; letter-spacing: 0.14em;
  text-transform: uppercase; font-weight: 600; padding: 4px 10px; cursor: pointer; }
.rp-filter-btn.active { background: #111; color: #fff; border-color: #111; }
.rp-filter-btn:hover:not(.active) { border-color: #cc0000; color: #cc0000; }

.rp-main { padding: 24px 28px 80px; }

.rp-table-wrap { overflow-x: auto; }
table.rp-table { width: 100%; border-collapse: collapse; font-size: 13px; }
table.rp-table th { font-family: 'Oswald', sans-serif; font-size: 10px;
  letter-spacing: 0.18em; text-transform: uppercase; color: #888;
  background: #fafafa; padding: 9px 12px; text-align: left;
  border-bottom: 2px solid #e0e0e0; white-space: nowrap; cursor: pointer; user-select: none; }
table.rp-table th:hover { color: #cc0000; }
table.rp-table th .sort-arrow { margin-left: 4px; color: #cc0000; }
table.rp-table td { padding: 10px 12px; border-bottom: 1px solid #eee;
  vertical-align: middle; }
table.rp-table tbody tr:hover { background: #fafafa; }
.rp-ts { font-family: 'Oswald', sans-serif; font-size: 12px; color: #888; white-space: nowrap; }
.rp-route { font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 13px; }
.rp-order { font-family: 'Oswald', sans-serif; font-size: 13px; letter-spacing: 0.08em; }
.rp-customer { font-weight: 500; }
.rp-field { display: inline-block; font-family: 'Oswald', sans-serif; font-size: 10px;
  letter-spacing: 0.14em; text-transform: uppercase; padding: 2px 8px;
  border: 1px solid; font-weight: 600; }
.rp-field.status  { color: #111; border-color: #111; }
.rp-field.customerEta { color: #555; border-color: #ccc; }
.rp-field.phone   { color: #555; border-color: #ccc; }
.rp-field.smsSent { color: #cc0000; border-color: #cc0000; }
.rp-val { font-family: 'Oswald', sans-serif; font-size: 13px; color: #888; }
.rp-arrow { color: #ccc; margin: 0 6px; }
.rp-val.new { color: #111; font-weight: 600; }

.rp-empty { padding: 80px 24px; text-align: center; color: #888; }
.rp-empty-code { font-family: 'Oswald', sans-serif; font-size: 60px; color: #ddd; margin-bottom: 12px; }
.rp-empty-msg { font: 400 14px/1.7 'Roboto'; }

.rp-foot { text-align: center; font-family: 'Oswald', sans-serif; font-size: 11px;
  letter-spacing: 0.18em; text-transform: uppercase; color: #aaa; padding: 16px; }

/* Login */
.dx-login-shell { min-height: 100vh; background: #fff; display: flex;
  align-items: center; justify-content: center; padding: 40px 20px; }
.dx-login { width: 100%; max-width: 360px; }
.dx-login-brand { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 32px; }
.dx-login-product { font-family: 'Oswald', sans-serif; font-size: 22px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase; color: #cc0000; }
.dx-login-sub { font-family: 'Oswald', sans-serif; font-size: 11px;
  letter-spacing: 0.22em; text-transform: uppercase; color: #888; }
.dx-login-form { border: 2px solid #111; background: #fff; }
.dx-login-form-head { background: #111; color: #fff; padding: 8px 16px;
  font-family: 'Oswald', sans-serif; font-size: 12px; letter-spacing: 0.20em; text-transform: uppercase; }
.dx-login-fields { padding: 18px 18px 14px; display: flex; flex-direction: column; gap: 12px; }
.dx-login-field { display: flex; flex-direction: column; gap: 5px; }
.dx-login-field label { font-family: 'Oswald', sans-serif; font-size: 10px;
  letter-spacing: 0.22em; text-transform: uppercase; color: #888; }
.dx-input { font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 600;
  color: #111; padding: 9px 12px; border: 1px solid #111; background: #fff;
  text-transform: uppercase; letter-spacing: 0.06em; width: 100%; }
.dx-input:focus { outline: 0; border-color: #cc0000; }
.dx-login-actions { padding: 0 18px 18px; }
.dx-login-error { color: #cc0000; font-size: 12px; padding: 8px 16px 0;
  font-family: 'Oswald', sans-serif; letter-spacing: 0.10em; text-transform: uppercase; font-weight: 600; }
.dx-action-btn { background: #fff; border: 1px solid #111; color: #111;
  font-family: 'Oswald', sans-serif; font-size: 12px; letter-spacing: 0.16em;
  text-transform: uppercase; padding: 11px 12px; cursor: pointer; font-weight: 600; width: 100%; }
.dx-action-btn.primary { background: #cc0000; color: #fff; border-color: #cc0000; }
.dx-action-btn.primary:hover { background: #a30000; }

.dx-toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #111; border-top: 3px solid #cc0000; color: #fff;
  font-family: 'Oswald', sans-serif; font-size: 13px; letter-spacing: 0.20em;
  text-transform: uppercase; padding: 12px 22px; z-index: 100; pointer-events: none; }
.dx-toast.error { background: #cc0000; border-top-color: #fff; }
</style>
</head>

let toastTimer = null;
function toast(msg, error=false) {
  const el = document.getElementById('dx-toast');
  el.textContent = msg; el.className = 'dx-toast' + (error?' error':'');
  el.style.display = 'block'; clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.style.display='none', 2400);
}

async function dbGet(path) {
  const r = await fetch(`${DB}/${path}.json`);
  if (!r.ok) throw new Error(`DB ${r.status}`);
  return r.json();
}

const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtTS = ms => new Date(ms).toLocaleString('en-US',{month:'2-digit',day:'2-digit',year:'2-digit',hour:'numeric',minute:'2-digit'});

// ── State ────────────────────────────────────────────────────────────────────
let ALL_ROWS   = [];   // flat array of history entries
let FILTERED   = [];   // after field filter
let SORT_COL   = 'changedAt';
let SORT_DIR   = -1;   // -1 = desc
let FIELD_FILTER = 'all';

// ── Load ─────────────────────────────────────────────────────────────────────
async function loadData() {
  const from = document.getElementById('rp-from').value;
  const to   = document.getElementById('rp-to').value;
  if (!from || !to) { toast('Set both dates', true); return; }

  document.getElementById('rp-table-area').innerHTML =
    '<div class="rp-empty"><div class="rp-empty-msg">Loading…</div></div>';

  // Build list of date keys in range
  const dates = [];
  let cur = new Date(from + 'T00:00:00');
  const end = new Date(to + 'T00:00:00');
  while (cur <= end) {
    dates.push(cur.toISOString().slice(0,10));
    cur.setDate(cur.getDate()+1);
  }

  try {
    const results = await Promise.all(dates.map(d => dbGet(`history/${d}`)));
    ALL_ROWS = [];
    dates.forEach((d, i) => {
      const day = results[i];
      if (!day) return;
      Object.entries(day).forEach(([key, entry]) => {
        if (entry) ALL_ROWS.push({ _key: key, _date: d, ...entry });
      });
    });
    ALL_ROWS.sort((a,b) => b.changedAt - a.changedAt);
    applyFilter();
    renderTable();
    renderSummary();
  } catch(e) { toast(e.message, true); }
}

function applyFilter() {
  FILTERED = FIELD_FILTER === 'all'
    ? ALL_ROWS.slice()
    : ALL_ROWS.filter(r => r.field === FIELD_FILTER);
  sortRows();
}

function sortRows() {
  FILTERED.sort((a,b) => {
    let av = a[SORT_COL] ?? '', bv = b[SORT_COL] ?? '';
    if (typeof av === 'number') return SORT_DIR * (av - bv);
    return SORT_DIR * String(av).localeCompare(String(bv));
  });
}

function renderSummary() {
  const el = document.getElementById('rp-summary');
  if (!el) return;
  const statusChanges = ALL_ROWS.filter(r=>r.field==='status').length;
  const completed     = ALL_ROWS.filter(r=>r.field==='status'&&r.newValue==='complete').length;
  const smsResends    = ALL_ROWS.filter(r=>r.field==='smsSent').length;
  el.innerHTML = `
    <div class="rp-stat"><div class="rp-stat-label">Total Events</div><div class="rp-stat-value">${ALL_ROWS.length}</div></div>
    <div class="rp-stat"><div class="rp-stat-label">Status Changes</div><div class="rp-stat-value">${statusChanges}</div></div>
    <div class="rp-stat"><div class="rp-stat-label">Delivered</div><div class="rp-stat-value">${completed}</div></div>
    <div class="rp-stat"><div class="rp-stat-label">SMS Resends</div><div class="rp-stat-value">${smsResends}</div></div>`;
}

// ── Table ─────────────────────────────────────────────────────────────────────
const COLS = [
  { key:'changedAt',    label:'Timestamp' },
  { key:'routeId',     label:'Route' },
  { key:'asset',       label:'Unit' },
  { key:'driverName',  label:'Driver' },
  { key:'orderNumber', label:'Order #' },
  { key:'customerName',label:'Customer' },
  { key:'field',       label:'Field' },
  { key:'oldValue',    label:'Old' },
  { key:'newValue',    label:'New' },
];

function renderTable() {
  const area = document.getElementById('rp-table-area');
  if (!area) return;
  if (FILTERED.length === 0) {
    area.innerHTML = `<div class="rp-empty"><div class="rp-empty-code">&#8709;</div>
      <div class="rp-empty-msg">No activity found for this range${FIELD_FILTER!=='all'?' and filter':''}.</div></div>`;
    return;
  }

  const thead = COLS.map(c => {
    const arrow = c.key === SORT_COL ? `<span class="sort-arrow">${SORT_DIR===-1?'↓':'↑'}</span>` : '';
    return `<th data-col="${c.key}">${c.label}${arrow}</th>`;
  }).join('');

  const tbody = FILTERED.map(r => `
    <tr>
      <td class="rp-ts">${esc(fmtTS(r.changedAt))}</td>
      <td class="rp-route">${esc(r.routeId||'—')}</td>
      <td>${esc(r.asset||'—')}</td>
      <td>${esc(r.driverName||'—')}</td>
      <td class="rp-order">${esc(r.orderNumber||'—')}</td>
      <td class="rp-customer">${esc(r.customerName||'—')}</td>
      <td><span class="rp-field ${esc(r.field||'')}">${esc(r.field||'—')}</span></td>
      <td class="rp-val">${esc(r.oldValue||'—')}</td>
      <td class="rp-val new">${esc(r.newValue||'—')}</td>
    </tr>`).join('');

  area.innerHTML = `
    <div class="rp-table-wrap">
      <table class="rp-table">
        <thead><tr>${thead}</tr></thead>
        <tbody>${tbody}</tbody>
      </table>
    </div>
    <div class="rp-foot">${FILTERED.length} event${FILTERED.length!==1?'s':''} &mdash; history/${document.getElementById('rp-from').value} to ${document.getElementById('rp-to').value}</div>`;

  area.querySelectorAll('th[data-col]').forEach(th => {
    th.onclick = () => {
      const col = th.dataset.col;
      if (SORT_COL === col) SORT_DIR *= -1;
      else { SORT_COL = col; SORT_DIR = -1; }
      sortRows();
      renderTable();
    };
  });
}

// ── CSV export ────────────────────────────────────────────────────────────────
function exportCSV() {
  if (!FILTERED.length) { toast('Nothing to export', true); return; }
  const headers = ['Timestamp','Date','Route','Unit','Driver','Order #','Customer','Address','Field','Old Value','New Value'];
  const rows = FILTERED.map(r => [
    fmtTS(r.changedAt), r._date, r.routeId, r.asset, r.driverName,
    r.orderNumber, r.customerName, r.address, r.field, r.oldValue, r.newValue
  ].map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(','));
  const csv  = [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type:'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `bcc-dispatch-activity-${document.getElementById('rp-from').value}-to-${document.getElementById('rp-to').value}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('CSV downloaded');
}

// ── Boot ──────────────────────────────────────────────────────────────────────
renderPin();
</script>
